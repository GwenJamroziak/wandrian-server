<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wandrian</title>
<style>
:root{
  --hp:#d94a4a; --stamina:#eae6d9; --xp:#9e59d9; --gold:#e0b23d;
  --bg:#12140f; --panel:#1c2018; --panel2:#242a1e; --border:#3a4230;
  --text:#e8e4d8; --muted:#9a9686; --accent:#4a7a3a;
}
*{box-sizing:border-box;}
body{
  margin:0; font-family:Georgia,'Times New Roman',serif; background:radial-gradient(ellipse at 50% 20%,#2a3322,#0c0e09 75%);
  color:var(--text); min-height:100vh;
}
#app{max-width:1100px;margin:0 auto;padding:28px 24px 60px;}
h1,h2,h3{margin:0 0 6px;}
h1{font-size:2.4em;color:#fff;text-shadow:0 0 12px rgba(255,180,80,.35);}
.subtitle{color:#f0d9a0;font-size:1.05em;margin-bottom:10px;}
.lore{color:#d8d4c8;max-width:600px;line-height:1.5em;margin-bottom:14px;}
.muted{color:var(--muted);font-size:.85em;}
.flavor{color:#c0b8a0;font-style:italic;margin:6px 0 14px;}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.col{display:flex;flex-direction:column;}
.gap{gap:8px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:16px 0;}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px 16px;}
.tile{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
button{
  font-family:inherit;background:#2a3020;color:var(--text);border:1px solid var(--border);
  border-radius:6px;padding:10px 14px;cursor:pointer;font-size:.95em;transition:.12s;
}
button:hover:not(:disabled){background:#3a4a2a;border-color:#5a7a3a;}
button:disabled{opacity:.45;cursor:not-allowed;}
button.play:hover:not(:disabled){background:#3a4a2a;border-color:#5a7a3a;}
button.danger:hover:not(:disabled){background:#5a2a24;border-color:#8a4a3a;}
button.wide{width:100%;}
input[type=text],input[type=password],input[type=email],input[type=number],select{
  font-family:inherit;background:#1a1c14;border:1px solid var(--border);color:var(--text);
  border-radius:5px;padding:8px 10px;font-size:.95em;
}
input[type=text]:focus,input[type=password]:focus,input[type=email]:focus,input[type=number]:focus,select:focus{
  outline:none;border-color:#5a7a3a;box-shadow:0 0 0 2px rgba(90,122,58,.3);
}
select{cursor:pointer;}
/* Browsers force a white/yellow background on autofilled fields regardless of author
   CSS (username/password fields on the login/register screens are exactly the ones
   that trigger this), this is the standard workaround: paint the fill color via an
   absurdly long inset box-shadow transition instead of background, which autofill
   styling doesn't override. */
input:-webkit-autofill,input:-webkit-autofill:hover,input:-webkit-autofill:focus{
  -webkit-text-fill-color:var(--text)!important;
  -webkit-box-shadow:0 0 0px 1000px #1a1c14 inset!important;
  box-shadow:0 0 0px 1000px #1a1c14 inset!important;
  transition:background-color 9999s ease-in-out 0s;
  caret-color:var(--text);
}
input[type=checkbox]{
  appearance:none;-webkit-appearance:none;width:19px;height:19px;border:1px solid var(--border);
  border-radius:4px;background:#1a1c14;cursor:pointer;position:relative;vertical-align:middle;flex:none;
}
input[type=checkbox]:hover{border-color:#5a7a3a;}
input[type=checkbox]:checked{background:var(--accent);border-color:#5a7a3a;}
input[type=checkbox]:checked::after{content:"✓";position:absolute;top:-3px;left:2.5px;color:#eef7e4;font-size:14px;font-weight:bold;}
.modal-backdrop{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;}
.modal-box{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:20px 22px;max-width:420px;box-shadow:0 8px 30px rgba(0,0,0,.6);}
.modal-box .row{justify-content:flex-end;margin-top:16px;}
.social-login-btn{display:flex;align-items:center;justify-content:center;gap:8px;}
.bar-bg{background:#000;border-radius:4px;overflow:hidden;height:16px;border:1px solid rgba(255,255,255,.08);}
.bar-fill{height:100%;transition:width .25s;}
.bar-hp{background:var(--hp);} .bar-stamina{background:var(--stamina);} .bar-xp{background:var(--xp);} .bar-gold{background:var(--gold);} .bar-brew{background:#c9a04a;}
.hp-text{color:var(--hp);} .stamina-text{color:var(--stamina);} .xp-text{color:var(--xp);} .gold-text{color:var(--gold);}
a.back-link,.linklike{color:#cbd9a0;cursor:pointer;text-decoration:underline;}
.icon-badge{width:56px;height:56px;border-radius:50%;overflow:hidden;flex:none;background:#000;display:flex;align-items:center;justify-content:center;}
.icon-badge svg{width:100%;height:100%;}
.services{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0;}
.maze-wrap{display:flex;gap:20px;align-items:flex-start;}
.maze-grid{display:grid;gap:1px;background:#000;border:2px solid #333;}
.maze-tile{width:34px;height:34px;}
.side-panel{min-width:260px;display:flex;flex-direction:column;gap:8px;}
hr{border:none;border-top:1px solid var(--border);margin:14px 0;}
.tooltip{position:relative;cursor:help;border-bottom:1px dotted var(--muted);}
.tooltip:hover::after{
  content:attr(data-tip);position:absolute;bottom:120%;left:0;background:#000;color:#fff;
  padding:6px 8px;border-radius:4px;font-size:.8em;white-space:pre-line;width:220px;z-index:10;
  box-shadow:0 2px 8px rgba(0,0,0,.6);
}
.plank-row{display:flex;gap:8px;margin:6px 0;}
.plank-row button.locked-safe{background:#254a25;color:#9fe89f;border-color:#3a7a3a;}
.plank-row button.locked-fail{background:#4a2020;color:#e89f9f;border-color:#7a3a3a;}
.dim-note{color:#8a8676;font-size:.82em;}
.version-tag{position:fixed;bottom:24px;right:12px;color:rgba(230,225,210,.6);font-size:.8em;}
.changelog-link{position:fixed;bottom:8px;right:12px;color:rgba(180,210,150,.75);font-size:.75em;cursor:pointer;text-decoration:none;}
.changelog-link:hover{color:#cbd9a0;text-decoration:underline;}
::-webkit-scrollbar{width:10px;} ::-webkit-scrollbar-thumb{background:#3a4230;border-radius:5px;}
.top-bar{display:flex;justify-content:flex-end;align-items:center;gap:14px;margin-bottom:12px;flex-wrap:wrap;}
.chat-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;color:#cbd9a0;}
.chat-toggle:hover{color:#e8e4d8;}
.chat-panel{position:fixed;top:0;right:0;height:100vh;width:25%;min-width:280px;max-width:420px;background:var(--panel);border-left:1px solid var(--border);box-shadow:-6px 0 20px rgba(0,0,0,.55);z-index:80;display:flex;flex-direction:column;padding:14px;}
.chat-private-msg{background:#2a3a20;border:1px solid #4a6a3a;border-radius:6px;padding:4px 8px;margin:2px 0;}
.trash-btn{flex:0 0 auto;padding:8px 10px;}
.blocked-icon{opacity:.85;}
.dim-icon{opacity:.4;}
.bar-bg.compact{height:8px;}
.town-quadrants{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:14px;align-items:start;}
.town-quadrants .panel{margin-bottom:0;height:100%;min-width:0;}
.town-quadrants > *{min-width:0;}
.gear-row{display:flex;justify-content:space-between;align-items:center;gap:10px;}
.gear-row-actions{display:flex;gap:6px;flex:0 0 auto;}
.rarity-Common{color:#9a9686;} .rarity-Uncommon{color:#e8e4d8;} .rarity-Rare{color:#5a9ae0;} .rarity-Epic{color:#e0c94a;} .rarity-Legendary{color:#d9902f;}
.plank-btn{min-width:52px;}
.plank-btn.safe{background:#254a25;color:#9fe89f;border-color:#3a7a3a;}
.plank-btn.unsafe{background:#4a2020;color:#e89f9f;border-color:#7a3a3a;}
.maze-overlay-grid{position:absolute;top:0;left:0;width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;z-index:20;opacity:1;transition:opacity 1.3s ease;text-align:center;}
.maze-overlay-grid.fade{opacity:0;}
.maze-overlay-text{color:#e8d24a;font-size:1.8em;font-weight:bold;letter-spacing:1.5px;text-shadow:0 0 18px rgba(232,210,74,.6);padding:0 10px;}
.venture-card{padding:18px;display:flex;flex-direction:column;gap:12px;}
.venture-title{font-size:1.25em;font-weight:bold;}
.venture-row{align-items:stretch;}
.venture-clickable{flex:1;cursor:pointer;transition:.12s;}
.venture-clickable:hover{background:#28331e;}
.venture-chevrons{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 10px;}
.venture-chevrons button{padding:2px 10px;font-size:1em;line-height:1;}
.class-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0 14px;position:relative;}
.class-grid>*{min-width:0;}
.class-path-bg{background:var(--panel2);border:1px solid var(--border);border-radius:10px;}
.plank-btn{min-width:52px;border-radius:4px;}
.equip-doll{display:flex;flex-direction:column;gap:6px;}
.equip-doll-row{display:flex;gap:6px;justify-content:center;}
.equip-doll-row>.tile{flex:1;min-width:0;}
.attr-collapse-btn{background:none;border:none;color:var(--text);cursor:pointer;font-size:1.1em;padding:2px 6px;}
.attr-collapse-btn:hover{color:#cbd9a0;}
.stat-point-cta{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:var(--gold);color:#2a2210;font-weight:bold;border-radius:5px;cursor:pointer;font-size:1.1em;line-height:1;}
.stat-point-cta:hover{background:#f0c85a;}
</style>
</head>
<body>
<div id="app"></div>
<div id="modalRoot"></div>
<div class="version-tag" id="versionTag"></div>
<div class="changelog-link" id="changelogLink">Changelog</div>

/* =========================================================================
   WANDRIAN, browser port
   Faithful re-implementation of the Godot/GDScript build's data + balance
   + core loop as a single self-contained HTML/JS file, so it can be hosted
   on literally any static host (no export templates, no COOP/COEP headers
   needed) and friends can just open a link. See the in-game "About this
   build" note in the admin panel for what's deferred vs. the native build.
   ========================================================================= */

/* Procedurally-generated monster portraits (placeholder art, swap in bespoke assets any time
   by replacing monsterPortrait() with a lookup into a real MONSTER_PORTRAITS map). Deterministic
   per monster id so the same monster always looks the same; a "slain" variant is derived from
   the same shape with X eyes, a lolling tongue, and a dizzy swirl for the post-combat view. */
function hashHue(str){ let hh=0; for(let i=0;i<str.length;i++) hh=(hh*31+str.charCodeAt(i))>>>0; return hh%360; }
function monsterPortrait(monsterId, opts={}){
  const slain=!!opts.slain;
  const hue=hashHue(monsterId||"?");
  const bodyColor=`hsl(${hue},45%,38%)`;
  const bellyColor=`hsl(${hue},35%,58%)`;
  const eyes = slain
    ? `<path d="M55,75 L70,90 M70,75 L55,90" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/><path d="M90,75 L105,90 M105,75 L90,90" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>`
    : `<circle cx="62" cy="80" r="7" fill="#1a1a1a"/><circle cx="98" cy="80" r="7" fill="#1a1a1a"/><circle cx="64" cy="78" r="2" fill="#fff"/><circle cx="100" cy="78" r="2" fill="#fff"/>`;
  const mouth = slain
    ? `<path d="M65,103 Q80,98 95,103" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round"/><ellipse cx="80" cy="112" rx="6" ry="9" fill="#c96a6a"/>`
    : `<path d="M65,105 Q80,116 95,105" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round"/>`;
  const dizzy = slain
    ? `<path d="M58,48 Q68,38 78,48 Q88,58 98,48" stroke="#e0c94a" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.85"/><circle cx="58" cy="46" r="2.2" fill="#e0c94a"/><circle cx="98" cy="46" r="2.2" fill="#e0c94a"/>`
    : "";
  return `<svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg"><ellipse cx="80" cy="95" rx="55" ry="48" fill="${bodyColor}"${slain?' opacity="0.7"':''}/><ellipse cx="80" cy="107" rx="34" ry="26" fill="${bellyColor}" opacity="0.6"/>${dizzy}${eyes}${mouth}</svg>`;
}

/* Procedural placeholder art for potions/scrolls/bags, each item id gets its own hue so
   different items (and different tiers of the same base type) read as visually distinct.
   Swap these for real art any time; nothing else needs to change. */
function itemIconSvg(itemId){
  const item=DL.getItem(itemId);
  const hue=hashHue(itemId);
  if(item.type==="consumable"){
    const liquid=`hsl(${hue},70%,52%)`;
    return `<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><rect x="16" y="4" width="8" height="6" rx="1" fill="#8a8a8a"/><path d="M15,10 L15,17 Q9,22 9,29 Q9,36 20,36 Q31,36 31,29 Q31,22 25,17 L25,10 Z" fill="#cfe6ee" stroke="#7a9aa8" stroke-width="1.5"/><path d="M10,25 Q9,33 20,34 Q31,33 30,25 Q31,31 20,32 Q9,31 10,25 Z" fill="${liquid}"/></svg>`;
  }
  if(item.type==="scroll"){
    const ribbon=`hsl(${hue},60%,45%)`;
    return `<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="14" width="28" height="12" rx="6" fill="#e8d9b0" stroke="#a8946a" stroke-width="1.5"/><rect x="4" y="14" width="6" height="12" rx="3" fill="#d8c090"/><rect x="30" y="14" width="6" height="12" rx="3" fill="#d8c090"/><rect x="10" y="18" width="20" height="2" fill="${ribbon}"/></svg>`;
  }
  if(item.type==="bag"){
    const cloth=`hsl(${hue},35%,42%)`;
    return `<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><path d="M12,16 Q20,10 28,16 L30,34 Q20,38 10,34 Z" fill="${cloth}" stroke="#2a2a2a" stroke-width="1.2"/><rect x="17" y="9" width="6" height="6" rx="2" fill="none" stroke="#c9a04a" stroke-width="1.5"/></svg>`;
  }
  return `<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="14" fill="#666"/></svg>`;
}
function itemIcon(itemId,size=26){ return iconBadge(itemIconSvg(itemId),size); }

function herbIconSvg(herbId){
  const hue=hashHue(herbId);

  return `<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><path d="M20,6 Q32,14 32,26 Q20,34 8,26 Q8,14 20,6 Z" fill="${leaf}" stroke="#2a2a2a" stroke-width="1.2"/><path d="M20,9 L20,31" stroke="#1a1a1a" stroke-width="1" opacity="0.45"/></svg>`;
}
function herbIcon(herbId,size=22){ return iconBadge(herbIconSvg(herbId),size); }

  killStreakStatMult(s){return 1.0+this.KILL_STREAK_STAT_GROWTH_PER_KILL*Math.min(s,this.KILL_STREAK_CAP);},

  xpRequiredForLevel(level){return Math.round(this.KILLS_PER_LEVEL_TARGET*this.monsterXpReward(this.MONSTER_BASE_XP,level));},
  monsterXpReward(baseXp,areaLevel){return baseXp*Math.pow(1.0+this.AREA_XP_GROWTH,areaLevel);},
  monsterHp(baseHp,areaLevel){return baseHp*this.MONSTER_HP_MULT*Math.pow(1.0+this.AREA_HP_GROWTH,areaLevel);},
  monsterDamage(baseDmg,areaLevel){return baseDmg*this.MONSTER_DAMAGE_MULT*Math.pow(1.0+this.AREA_DAMAGE_GROWTH,areaLevel);},
  lootMultiplier(areaLevel){return Math.pow(1.0+this.AREA_LOOT_GROWTH,areaLevel);},
  itemTierForAreaLevel(areaLevel){return clampi(1+Math.floor(areaLevel/15.0),1,this.ITEM_TIER_MAX);},
  itemTierStatRange(tier){const t=clampi(tier,1,this.ITEM_TIER_MAX);return [(t-1)*this.ITEM_STAT_PER_TIER+1,t*this.ITEM_STAT_PER_TIER];},
  itemTierAdjective(tier){return this.ITEM_TIER_ADJECTIVES[clampi(tier-1,0,this.ITEM_TIER_ADJECTIVES.length-1)];},
  rollRarity(){
    let total=0; for(const r of this.RARITY_TABLE) total+=r.weight;
    let roll=Math.floor(Math.random()*total), cum=0;
    for(const r of this.RARITY_TABLE){cum+=r.weight; if(roll<cum) return r;}
    return this.RARITY_TABLE[0];
  },
  bridgePlankCount(tier){return clampi((tier||1)+1,this.BRIDGE_MIN_PLANKS,this.BRIDGE_MAX_PLANKS);},
  bridgeStepPassChance(tier){return 1.0/this.bridgePlankCount(tier);},
  trialLevelRequirement(tier){return clampi(tier||1,1,4)*this.TRIAL_LEVEL_REQUIREMENT_PER_TIER;},
  // v0.12: weapon skill hit-count math. Level L is reached once cumulative hits pass
  // WEAPON_SKILL_HIT_STEP * L*(L+1)/2 (a triangular number: 100, 300, 600, 1000, ...),
  // i.e. level L costs L*100 more hits than level L-1 -- matches Gwen's "100 strikes for
  // level 1, 200 more for level 2, 300 more for level 3" spec, extended indefinitely.
  weaponSkillCumulativeHitsForLevel(level){ return this.WEAPON_SKILL_HIT_STEP*level*(level+1)/2; },
  weaponSkillLevelForHits(hits){
    let level=0;
    while(this.weaponSkillCumulativeHitsForLevel(level+1)<=hits) level++;
    return level;
  },
  // Bug fix (v0.12): Stronghold Keys must only be obtainable while fighting in an area
  // at or above the character's own level, otherwise a high-level character could revisit
  // a trivial low-level maze and farm guaranteed-easy guardian kills for keys, undermining
  // the whole "worth the effort" point of the mechanic. The guardian fight itself, and the
  // chest's other loot, are unaffected -- only the key drop roll is gated.
  strongholdKeyEligible(mazeDepth, playerLevel){ return (mazeDepth||1)>=(playerLevel||1); },
  salvageValue(tier,slots){return tier*slots*this.SALVAGE_MATERIALS_PER_SLOT;},
  rerollCost(tier,slots){return this.salvageValue(tier,slots)*this.REROLL_MATERIAL_COST_MULT;},
  sellValue(tier,slots){return tier*this.SELL_GOLD_PER_TIER+slots*this.SELL_GOLD_PER_SLOT;},
  bagBuyPrice(cap){return cap*this.BAG_BUY_GOLD_PER_CAPACITY;},
  // v0.12: Merchant buy price for any consumable/scroll -- item.buy_price overrides the
  // default sell_value*VENDOR_MARKUP formula when an item needs an exact price point
  // (see elixir_of_eyesight). Shared by screenMerchant's display price and PS.buyConsumable
  // so the two can never drift out of sync.
  itemBuyPrice(item){ return item.buy_price!=null ? item.buy_price : Math.round((item.sell_value||1)*this.VENDOR_MARKUP); },
  bagCraftCost(cap){return cap*this.BAG_CRAFT_MATERIALS_PER_CAPACITY;},
};

function clampi(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function clampf(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function randi(n){return Math.floor(Math.random()*n);}
function randRange(a,b){return a+Math.random()*(b-a);}
function randIntRange(a,b){return a+Math.floor(Math.random()*(b-a+1));}
function pick(arr){return arr[randi(arr.length)];}

/* ---------- DataLoader-equivalent lookups ---------- */

const DL = {
  getClass(id){return CLASSES[id]||{};},
  starterClassIds(){return Object.keys(CLASSES).filter(id=>CLASSES[id].tier===1);},
  getNextClassId(id){const c=this.getClass(id); return c.next_class||"";},
  getItem(id){return ITEMS[id]||{};},
  getMonster(id){return MONSTERS.find(m=>m.id===id)||{};},
  getHerb(id){return HERBS[id]||{};},
  allHerbIds(){return Object.keys(HERBS);},
  commonHerbIds(){return Object.keys(HERBS).filter(id=>!HERBS[id].rare);},
  pickHerbForNode(){
    if(Math.random()<Balance.RARE_HERB_CHANCE) return "starveil";
    return pick(DL.commonHerbIds());
  },
  allRecipes(){return RECIPES;},
  pickRandomMonsterForArea(areaLevel){
    let pool=MONSTERS.filter(m=>{
      if(m.tier==="common") return true;
      if(m.tier==="uncommon") return areaLevel>=8;
      if(m.tier==="rare") return areaLevel>=20;
      if(m.tier==="epic") return areaLevel>=35;
      return false;
    });
    if(pool.length===0) pool=MONSTERS;
    return pick(pool);
  },
  rollLoot(tableId){
    const table=LOOT_TABLES[tableId]||[];
    if(table.length===0) return {type:"nothing"};
    let total=0; for(const e of table) total+=e.weight;
    if(total<=0) return {type:"nothing"};
    let roll=randi(total), cum=0;
    for(const e of table){cum+=e.weight; if(roll<cum) return e;}
    return {type:"nothing"};
  },
};

  // one of a handful of weapon types, and each character tracks permanent, per-type
  // progression (see PS.weapon_skills) built up purely by landing hits with that type

  generate(tier, slot="", forcedRarityName=""){
    let chosenSlot=slot;
    if(!chosenSlot||!this.BASE_NAMES[chosenSlot]) chosenSlot=pick(this.GENERATION_SLOTS);
    const baseName=pick(this.BASE_NAMES[chosenSlot]||["Item"]);
    const rarity=forcedRarityName ? (Balance.RARITY_TABLE.find(r=>r.name===forcedRarityName)||Balance.rollRarity()) : Balance.rollRarity();
    const slotCount=rarity.slots;
    const [lo,hi]=Balance.itemTierStatRange(tier);
    let pool=[...Balance.AFFIX_POOL];
    shuffle(pool);
    // v0.12: weapons lean hard into damage now, instead of rolling it as just one of 12
    // equally-likely affixes. Below Balance.WEAPON_DAMAGE_GUARANTEE_CHANCE, "damage" is
    // pinned to the front of the pool (so any weapon with at least 1 affix slot gets it),
    // and whenever a weapon does roll damage, the value itself rolls noticeably higher
    // too (Balance.WEAPON_DAMAGE_AFFIX_MULT) -- both the odds AND the payoff go up.
    if(chosenSlot==="weapon" && Math.random()<Balance.WEAPON_DAMAGE_GUARANTEE_CHANCE && pool.includes("damage")){
      pool=pool.filter(s=>s!=="damage");
      pool.unshift("damage");
    }
    let element="";
    if(Math.random()<Balance.ELEMENT_ITEM_CHANCE){
      element=pick(Balance.ELEMENT_IDS);
      const biasStat=Balance.ELEMENT_AFFIX_BIAS[element]||"";
      if(biasStat && pool.includes(biasStat)){
        pool=pool.filter(s=>s!==biasStat);
        pool.unshift(biasStat);
      }
    }
    const affixCount=Math.min(slotCount,pool.length);
    const affixes=[];
    for(let i=0;i<affixCount;i++){
      const stat=pool[i];
      let value=randIntRange(lo,hi);
      if(chosenSlot==="weapon" && stat==="damage") value=Math.round(value*Balance.WEAPON_DAMAGE_AFFIX_MULT);
      affixes.push({stat, value});
    }
    if(Math.random()<Balance.EYESIGHT_AFFIX_CHANCE){
      affixes.push({stat:"eyesight", value:2});
    }
    return {instance_id:`${Date.now()}_${randi(999999)}`, slot:chosenSlot, base_name:baseName, tier, rarity:rarity.name, affixes, element};
  },
  displayName(inst){
    let name=`${inst.rarity} ${Balance.itemTierAdjective(inst.tier)} ${inst.base_name}`;
    if(inst.element) name+=` of ${Balance.ELEMENT_DISPLAY_NAMES[inst.element]||inst.element}`;
    return name;
  },
  affixTotal(inst,stat){
    if(!inst||!inst.affixes) return 0;
    let total=0; for(const a of inst.affixes) if(a.stat===stat) total+=a.value;
    return total;
  },
  slotCount(inst){return (inst.affixes||[]).length;},
  affixIsPercent(stat){return ["crit","armor","gold_find","xp_find"].includes(stat);},
  affixLabel(stat){
    switch(stat){
      case "damage": return "Damage"; case "hp": return "Hit Points"; case "crit": return "Critical Strike";
      case "armor": return "Armor"; case "regen": return "Regeneration"; case "gold_find": return "Gold Found";
      case "xp_find": return "Experience Gained"; case "stamina_max": return "Stamina"; case "eyesight": return "Eyesight";
      case "strength": return "Strength"; case "dexterity": return "Dexterity"; case "vitality": return "Vitality"; case "intelligence": return "Intelligence";
      default: return stat;
    }
  },
  formatAffix(a){
    const label=this.affixLabel(a.stat);
    if(this.affixIsPercent(a.stat)) return `+${Math.round(a.value)}% ${label}`;
    if(a.stat==="regen") return `+${a.value.toFixed(1)} ${label}`;
    return `+${Math.round(a.value)} ${label}`;
  },
  tooltipText(inst){
    const lines=[`${this.displayName(inst)} (Tier ${inst.tier})`];
    for(const a of inst.affixes) lines.push(this.formatAffix(a));
    return lines.join("\n");
  },
  affixSummary(inst){
    if(!inst.affixes||inst.affixes.length===0) return "(no bonuses)";
    return inst.affixes.map(a=>this.formatAffix(a)).join(", ");
  },
  reroll(inst){
    const [lo,hi]=Balance.itemTierStatRange(inst.tier);
    const newAffixes=inst.affixes.map(a=>({stat:a.stat,value:randIntRange(lo,hi)}));
    return {...inst, affixes:newAffixes};
  },
};

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=randi(i+1);[arr[i],arr[j]]=[arr[j],arr[i]];}}

/* ---------- Safe storage wrapper (falls back to in-memory if localStorage is blocked,
   e.g. when a file is opened directly via file:// in some browsers) ---------- */
const Storage_ = {
  available:true, _mem:{},
  init(){ try{ window.localStorage.setItem("__wandrian_test__","1"); window.localStorage.removeItem("__wandrian_test__"); this.available=true; }catch(e){ this.available=false; } },
  getItem(k){ return this.available ? window.localStorage.getItem(k) : (Object.prototype.hasOwnProperty.call(this._mem,k)?this._mem[k]:null); },
  setItem(k,v){ if(this.available) window.localStorage.setItem(k,v); else this._mem[k]=v; },
  removeItem(k){ if(this.available) window.localStorage.removeItem(k); else delete this._mem[k]; },
};
Storage_.init();

/* ---------- Networking: Wandrian is online-only (v0.10) ----------
   Log In / Register puts saves, the graveyard and the leaderboard on a real server
   (see the server folder), so friends can share a hosted link and see each other in
   chat and on the leaderboard. A `?api=https://example.com` query param can point the
   client at a server hosted on a different origin than the page itself. The old
   Play Offline / Storage_-only mode has been removed from the UI; Storage_ itself is
   kept only as the localStorage wrapper for session-token persistence. ---------- */

const NET_TOKEN_KEY="wandrian_web_token";
const NET_USERNAME_KEY="wandrian_web_username";

const Net = {
  online:false, token:null, username:null,
  cache:null,            // array of 6 slot entries from GET /api/characters
  graveyardCache:null,
  leaderboardCache:null, leaderboardCacheHardcore:null,
  auctionCache:null,
  vaultCache:null, vaultCapacity:200,
  chatMessages:[], privateMessages:[], chatSocket:null,
  apiBase(){
    const params=new URLSearchParams(location.search);
    return params.get("api") || "";
  },
  persistSession(){ Storage_.setItem(NET_TOKEN_KEY,this.token||""); Storage_.setItem(NET_USERNAME_KEY,this.username||""); },
  clearPersistedSession(){ Storage_.removeItem(NET_TOKEN_KEY); Storage_.removeItem(NET_USERNAME_KEY); },
  async tryResumeSession(){
    const token=Storage_.getItem(NET_TOKEN_KEY);
    const username=Storage_.getItem(NET_USERNAME_KEY);
    if(!token) return false;
    this.token=token; this.username=username; this.online=true;
    try{
      await this.refreshCharacters();
      return true;
    }catch(e){
      this.online=false; this.token=null; this.username=null; this.clearPersistedSession();
      return false;
    }
  },
  authHeaders(extra={}){ return Object.assign({"Authorization":"Bearer "+this.token}, extra); },
  async register(username,passcode,email){
    const res=await fetch(this.apiBase()+"/api/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username,passcode,email:email||undefined})});
    const json=await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(json.error||"Registration failed.");
    return json;
  },
  async login(username,passcode){
    const res=await fetch(this.apiBase()+"/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username,passcode})});
    const json=await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(json.error||"Login failed.");
    return json;
  },
  async afterAuth(username,token){
    this.username=username; this.token=token; this.online=true;
    this.persistSession();
    await this.refreshCharacters();
  },
  async refreshCharacters(){
    const res=await fetch(this.apiBase()+"/api/characters",{headers:this.authHeaders()});
    if(!res.ok) throw new Error("Could not load your characters from the server.");
    const json=await res.json();
    this.cache=json.slots;
  },
  logout(){
    this.online=false; this.token=null; this.username=null; this.cache=null;
    this.graveyardCache=null; this.leaderboardCache=null; this.leaderboardCacheHardcore=null;
    this.auctionCache=null; this.vaultCache=null; this.chatMessages=[]; this.privateMessages=[];
    if(this.chatSocket){ try{this.chatSocket.close();}catch(e){} this.chatSocket=null; }
    this.clearPersistedSession();
  },
  saveCharacter(slot,data){
    if(this.cache) this.cache[slot]={slot,data,updated_at:new Date().toISOString(),empty:false};
    fetch(this.apiBase()+"/api/characters/"+slot,{method:"PUT",headers:this.authHeaders({"Content-Type":"application/json"}),body:JSON.stringify(data)})
      .catch(e=>console.warn("save to server failed",e));
  },
  deleteCharacter(slot,hardcoreDeath){
    if(this.cache) this.cache[slot]={slot,empty:true};
    if(this.graveyardCache && hardcoreDeath) this.graveyardCache.unshift({name:hardcoreDeath.name,class_name:hardcoreDeath.class_name,level:hardcoreDeath.level,cause:hardcoreDeath.cause,died_at:new Date().toISOString()});
    fetch(this.apiBase()+"/api/characters/"+slot,{method:"DELETE",headers:this.authHeaders({"Content-Type":"application/json"}),body:JSON.stringify({hardcore_death:hardcoreDeath||null})})
      .catch(e=>console.warn("delete on server failed",e));
  },
  async fetchGraveyard(){
    const res=await fetch(this.apiBase()+"/api/graveyard",{headers:this.authHeaders()});
    const json=await res.json().catch(()=>({entries:[]}));
    this.graveyardCache=json.entries||[];
  },
  async fetchLeaderboard(){
    const res=await fetch(this.apiBase()+"/api/leaderboard");
    const json=await res.json().catch(()=>({entries:[]}));
    this.leaderboardCache=json.entries||[];
  },
  // Admin token (Dev Tools gate + leaderboard moderation): server-verified only, never
  // embedded in the client. Not persisted anywhere -- typed in fresh each session, sent
  // only in the X-Admin-Token header of these calls.
  async verifyAdminToken(adminToken){
    const res=await fetch(this.apiBase()+"/api/admin/verify",{headers:this.authHeaders({"X-Admin-Token":adminToken})});
    return res.ok;
  },
  async fetchAdminLeaderboard(adminToken){
    const res=await fetch(this.apiBase()+"/api/admin/leaderboard",{headers:this.authHeaders({"X-Admin-Token":adminToken})});
    const json=await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(json.error||"Could not load the full leaderboard.");
    return json.entries||[];
  },
  async adminDeleteLeaderboardEntry(accountId,characterName,adminToken){
    const url=this.apiBase()+`/api/admin/leaderboard/${accountId}/${encodeURIComponent(characterName)}`;
    const res=await fetch(url,{method:"DELETE",headers:this.authHeaders({"X-Admin-Token":adminToken})});
    const json=await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(json.error||"Could not delete that leaderboard entry.");
    return json;
  },
  async announceTrialResult(payload){
    if(!this.online) return;
    try{ await fetch(this.apiBase()+"/api/announce/trial",{method:"POST",headers:this.authHeaders({"Content-Type":"application/json"}),body:JSON.stringify(payload)}); }catch(e){}
  },
  async announceDeath(payload){
    if(!this.online) return;
    try{ await fetch(this.apiBase()+"/api/announce/death",{method:"POST",headers:this.authHeaders({"Content-Type":"application/json"}),body:JSON.stringify(payload)}); }catch(e){}
  },
  async announceCreated(payload){
    if(!this.online) return;
    try{ await fetch(this.apiBase()+"/api/announce/created",{method:"POST",headers:this.authHeaders({"Content-Type":"application/json"}),body:JSON.stringify(payload)}); }catch(e){}
  },
  // Storage Vault (v0.11): one shared 200-slot chest per account, so every character
  // slot on the account can deposit into and withdraw from the same stash server-side.
  async fetchVault(){
    const res=await fetch(this.apiBase()+"/api/vault",{headers:this.authHeaders()});
    const json=await res.json().catch(()=>({items:[],capacity:200}));
    this.vaultCache=json.items||[];
    this.vaultCapacity=json.capacity||200;
  },
  async saveVault(items){
    const res=await fetch(this.apiBase()+"/api/vault",{method:"PUT",headers:this.authHeaders({"Content-Type":"application/json"}),body:JSON.stringify({items})});
    const json=await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(json.error||"Could not save the vault.");
    return json;
  },
  async fetchAuction(){
    const res=await fetch(this.apiBase()+"/api/auction",{headers:this.authHeaders()});
    const json=await res.json().catch(()=>({listings:[]}));
    this.auctionCache=json.listings||[];
  },
  async createAuctionListing(payload){
    const res=await fetch(this.apiBase()+"/api/auction",{method:"POST",headers:this.authHeaders({"Content-Type":"application/json"}),body:JSON.stringify(payload)});
    const json=await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(json.error||"Could not create listing.");
    return json;
  },
  async buyAuctionListing(id,payload){
    const res=await fetch(this.apiBase()+"/api/auction/"+id+"/buy",{method:"POST",headers:this.authHeaders({"Content-Type":"application/json"}),body:JSON.stringify(payload)});
    const json=await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(json.error||"Could not complete purchase.");
    return json;
  },
  async cancelAuctionListing(id,payload){
    const res=await fetch(this.apiBase()+"/api/auction/"+id,{method:"DELETE",headers:this.authHeaders({"Content-Type":"application/json"}),body:JSON.stringify(payload)});
    const json=await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(json.error||"Could not cancel listing.");
    return json;
  },
  ensureChat(){
    if(this.chatSocket || !this.online) return;
    const wsProto = location.protocol==="https:" ? "wss://" : "ws://";
    const base = this.apiBase();
    const wsUrl = base ? base.replace(/^http/,"ws")+"/ws/chat?token="+this.token : wsProto+location.host+"/ws/chat?token="+this.token;
    try{
      const ws=new WebSocket(wsUrl);
      ws.onmessage=(ev)=>{
        try{
          const msg=JSON.parse(ev.data);
          if(msg.type==="history") this.chatMessages=msg.messages||[];
          else if(msg.type==="chat"){ this.chatMessages.push(msg); if(this.chatMessages.length>200) this.chatMessages.shift(); }
          else if(msg.type==="private_history"){ this.privateMessages=this.privateMessages.concat(msg.messages||[]); }
          else if(msg.type==="private"){ this.privateMessages.push(msg); }
          if(GF.screen==="chat" || GF.chatOpen) render();
        }catch(e){}
      };
      ws.onclose=()=>{ if(this.chatSocket===ws) this.chatSocket=null; };
      this.chatSocket=ws;
    }catch(e){ console.warn("chat connect failed",e); }
  },
  sendChat(message){
    if(this.chatSocket && this.chatSocket.readyState===WebSocket.OPEN) this.chatSocket.send(JSON.stringify({type:"chat",message}));
  },
};

/* ---------- Save slots / Graveyard ---------- */

const SAVE_KEY=(slot)=>`wandrian_web_slot_${slot}`;
const GRAVEYARD_KEY="wandrian_web_graveyard";

function hasSave(slot){return Storage_.getItem(SAVE_KEY(slot))!==null;}
function loadSaveRaw(slot){
  try{ return JSON.parse(Storage_.getItem(SAVE_KEY(slot))); }catch(e){ return null; }
}
function deleteSave(slot,hardcoreDeath){
  if(Net.online){ Net.deleteCharacter(slot,hardcoreDeath); return; }
  Storage_.removeItem(SAVE_KEY(slot));
}
function listCharacterSummaries(){
  if(Net.online){
    const out=[];
    for(const entry of (Net.cache||[])){
      if(entry.empty){ out.push({slot:entry.slot, empty:true}); continue; }
      const raw=entry.data; const c=DL.getClass(raw.class_id);
      out.push({slot:entry.slot, empty:false, class_id:raw.class_id, display_name:c.display_name||raw.class_id, character_name:raw.character_name||"Hero", level:raw.level||1, tier:c.tier||1, hardcore:!!raw.hardcore});
    }
    return out;
  }
  const out=[];
  for(let slot=0; slot<Balance.MAX_CHARACTER_SLOTS; slot++){
    const raw=loadSaveRaw(slot);
    if(raw){
      const c=DL.getClass(raw.class_id);
      out.push({slot, empty:false, class_id:raw.class_id, display_name:c.display_name||raw.class_id, character_name:raw.character_name||"Hero", level:raw.level||1, tier:c.tier||1, hardcore:!!raw.hardcore});
    } else out.push({slot, empty:true});
  }
  return out;
}
function readGraveyard(){
  if(Net.online) return Net.graveyardCache||[];
  try{return JSON.parse(Storage_.getItem(GRAVEYARD_KEY))||[];}catch(e){return [];}
}
function appendGraveyard(entry){
  if(Net.online) return; // server records this when deleteSave() sends hardcore_death
  const g=readGraveyard(); g.unshift(entry);
  Storage_.setItem(GRAVEYARD_KEY, JSON.stringify(g.slice(0,100)));
}

/* ---------- PlayerState-equivalent ---------- */

const PS = {
  class_id:"", character_name:"Hero", level:1, xp:0, xp_to_next:0, gold:0,
  current_hp:0, current_stamina:0, gear_instances:[], equipped:{}, equipped_bags:[],
  consumables:{}, materials:0, herbs:{}, pending_scroll_bonus:0,
  xp_buff_multiplier:1.0, xp_buff_encounters_left:0, stamina_shrine_buff:0.0,
  highest_tier_reached:1, season_won:false, kill_streak:0, hardcore:false, current_slot:-1,
  lifetime_xp:0, isRestingAtCampfire:false, eyesight_potion_steps_left:0, max_maze_depth_reached:1,

  // Stat Points / Attributes (v0.10). `attributes` is base class value + spent points
  // only, it deliberately excludes gear, see getTotalAttr(). `bonus_hp_from_attributes`/
  // `bonus_stamina_from_attributes` are cumulative totals built up one level-up at a time
  // (see addXp()): each level-up adds that moment's Vitality (and, for the paths where
  // Strength grants HP instead of damage, that moment's Strength too) to these pools, and
  // the pools only ever grow, previously granted HP/Stamina isn't lost by reallocating
  // points later, matching a real Diablo-style build where early investment compounds.
  attributes:{str:0,dex:0,vit:0,int:0}, unspent_stat_points:0,
  bonus_hp_from_attributes:0, bonus_stamina_from_attributes:0,

  // Weapon skill / proficiency (v0.12). Purely additive hit counters per weapon type,
  // never reset by anything (not promotion, not a season reset) -- see IF.WEAPON_TYPE_LIST
  // and Balance.weaponSkillLevelForHits(). Lazily backfilled by ensureWeaponSkills() so
  // pre-v0.12 saves and brand new characters both start every type at 0/0.
  weapon_skills:{},

  getClassData(){return DL.getClass(this.class_id);},
  ensureWeaponSkills(){
    for(const t of IF.WEAPON_TYPE_LIST) if(!this.weapon_skills[t]) this.weapon_skills[t]={hits:0};
  },
  getEquippedWeaponType(){ return IF.weaponTypeForInstance(this.equipped.weapon); },
  getWeaponSkillHits(weaponType){ this.ensureWeaponSkills(); return (this.weapon_skills[weaponType]||{hits:0}).hits; },
  getWeaponSkillLevel(weaponType){ return Balance.weaponSkillLevelForHits(this.getWeaponSkillHits(weaponType)); },
  // Progress toward the NEXT level, for progress-bar display (e.g. "37/100").
  getWeaponSkillProgress(weaponType){
    const hits=this.getWeaponSkillHits(weaponType);
    const level=Balance.weaponSkillLevelForHits(hits);
    const hitsAtLevelStart=Balance.weaponSkillCumulativeHitsForLevel(level);
    const hitsForNextLevel=Balance.weaponSkillCumulativeHitsForLevel(level+1)-hitsAtLevelStart;
    const hitsIntoLevel=hits-hitsAtLevelStart;
    return {level, hits, hitsIntoLevel, hitsForNextLevel};
  },
  // Called once per player attack (see screenCombat's playerTurn) when a weapon of a
  // known type is equipped. Returns whether this hit pushed the type to a new level, so
  // the caller can surface a small "your Sword skill increased!" toast.
  registerWeaponHit(weaponType){
    this.ensureWeaponSkills();
    const before=Balance.weaponSkillLevelForHits(this.weapon_skills[weaponType].hits);
    this.weapon_skills[weaponType].hits++;
    const after=Balance.weaponSkillLevelForHits(this.weapon_skills[weaponType].hits);
    return {leveledUp:after>before, newLevel:after};
  },
  getTotalAttr(key){
    const gearStat={str:"strength",dex:"dexterity",vit:"vitality",int:"intelligence"}[key];
    return (this.attributes[key]||0)+this.gearBonus(gearStat);
  },
  spendStatPoint(key){
    if(this.unspent_stat_points<=0 || !this.attributes.hasOwnProperty(key)) return false;
    this.attributes[key]++; this.unspent_stat_points--; return true;
  },
  getBlockChance(){
    // v0.12: Dexterity grants Block Chance on all 3 chains now, including Windrider,
    // where it doubles up as both the damage stat AND the block stat for that path.
    return clampf(this.getTotalAttr("dex")*Balance.BLOCK_CHANCE_PER_DEX,0,Balance.BLOCK_CHANCE_MAX);
  },
  _resetAttributesToClassBase(){
    const c=this.getClassData();
    this.attributes={str:c.base_str||5, dex:c.base_dex||5, vit:c.base_vit||5, int:c.base_int||5};
    this.unspent_stat_points=0; this.bonus_hp_from_attributes=0; this.bonus_stamina_from_attributes=0;
  },
  gearBonus(stat){
    let total=0;
    for(const slot of IF.EQUIPPED_SLOT_KEYS){
      const inst=this.equipped[slot];
      if(inst) total+=IF.affixTotal(inst,stat);
    }
    return total;
  },
  getMaxHp(){const c=this.getClassData(); return (c.base_hp||50)+(c.hp_per_level||5)*(this.level-1)+this.gearBonus("hp")+this.bonus_hp_from_attributes;},
  // v0.12: split out so the UI can show "base damage (from level+stats)" separately from
  // "bonus damage (from currently equipped gear)" -- previously these were only visible
  // combined, so a player had no way to tell whether e.g. +5 damage on a ring was actually
  // meaningful next to their level/attribute damage without doing the subtraction by hand.
  getDamageBreakdown(){
    const c=this.getClassData(); const perLevel=(c.damage_per_level||1.0)*(this.level-1);
    const gearBonus=this.gearBonus("damage");
    // Each chain has one attribute that scales its damage directly (base+points+gear,
    // recalculated live, unlike the HP/Stamina attribute bonuses below, this is not a
    // cumulative per-level-up pool, just "however much of that stat you currently have").
    let statBonus=0;
    if(c.chain==="thornguard") statBonus=this.getTotalAttr("str");
    else if(c.chain==="windrider") statBonus=this.getTotalAttr("dex");
    else if(c.chain==="wizard") statBonus=this.getTotalAttr("int");
    // v0.12: permanent weapon-type proficiency (see registerWeaponHit) grants a flat
    // +1 damage per level while a weapon of that type is currently equipped -- this is
    // deliberately kept separate from gearBonus, it comes from the character, not the item.
    const weaponType=this.getEquippedWeaponType();
    const weaponSkillBonus=weaponType ? this.getWeaponSkillLevel(weaponType)*Balance.WEAPON_SKILL_DAMAGE_PER_LEVEL : 0;
    const baseMin=(c.base_damage_min||1)+perLevel+statBonus+weaponSkillBonus, baseMax=(c.base_damage_max||2)+perLevel+statBonus+weaponSkillBonus;
    return {baseMin, baseMax, gearBonus, weaponSkillBonus, totalMin:baseMin+gearBonus, totalMax:baseMax+gearBonus};
  },
  getDamageRange(){
    const d=this.getDamageBreakdown();
    return [d.totalMin, d.totalMax];
  },
  getCritChance(){const c=this.getClassData(); return clampf((c.base_crit||0.05)+this.gearBonus("crit")/100.0,0,0.95);},
  getArmor(){const c=this.getClassData(); return clampf((c.armor||0.0)+this.gearBonus("armor")/100.0,0,0.75);},
  getRegen(){const c=this.getClassData(); return (c.regen||0.0)+this.gearBonus("regen");},
  getMaxStamina(){return Balance.STAMINA_MAX_BASE+this.gearBonus("stamina_max")+this.bonus_stamina_from_attributes;},
  getGoldFindMult(){return 1.0+this.gearBonus("gold_find")/100.0;},
  getXpFindMult(){return 1.0+this.gearBonus("xp_find")/100.0;},

  // Returns one line per active bonus (rather than one joined sentence) so the
  // Inventory screen can list each on its own row -- see gearBonusPanel().
  getGearBonusLines(){
    const parts=[];
    const dmg=this.gearBonus("damage"); if(dmg) parts.push(`+${Math.round(dmg)} Damage`);
    const hp=this.gearBonus("hp"); if(hp) parts.push(`+${Math.round(hp)} Hit Points`);
    const crit=this.gearBonus("crit"); if(crit) parts.push(`+${Math.round(crit)}% Critical Strike`);
    const armor=this.gearBonus("armor"); if(armor) parts.push(`+${Math.round(armor)}% Armor`);
    const regen=this.gearBonus("regen"); if(regen) parts.push(`+${regen.toFixed(1)} Regeneration`);
    const gf=this.gearBonus("gold_find"); if(gf) parts.push(`+${Math.round(gf)}% Gold Found`);
    const xf=this.gearBonus("xp_find"); if(xf) parts.push(`+${Math.round(xf)}% Experience Gained`);
    const sm=this.gearBonus("stamina_max"); if(sm) parts.push(`+${Math.round(sm)} Stamina`);
    const str=this.gearBonus("strength"); if(str) parts.push(`+${Math.round(str)} Strength`);
    const dex=this.gearBonus("dexterity"); if(dex) parts.push(`+${Math.round(dex)} Dexterity`);
    const vit=this.gearBonus("vitality"); if(vit) parts.push(`+${Math.round(vit)} Vitality`);
    const intl=this.gearBonus("intelligence"); if(intl) parts.push(`+${Math.round(intl)} Intelligence`);
    return parts;
  },

  addXp(amount){
    let buffed=amount*this.getXpFindMult();
    if(this.xp_buff_encounters_left>0) buffed*=this.xp_buff_multiplier;
    this.xp+=Math.round(buffed);
    this.lifetime_xp+=Math.round(buffed);
    let leveled=false;
    while(this.xp>=this.xp_to_next && this.level<Balance.LEVEL_CAP){
      this.xp-=this.xp_to_next; this.level++; this.xp_to_next=Balance.xpRequiredForLevel(this.level);
      this.unspent_stat_points+=Balance.STAT_POINTS_PER_LEVEL;
      // Vitality always adds to both pools (base+points only, never gear, see the
      // attributes/bonus_* fields' comment for why). Strength has no effect at all for
      // Wizard or Windrider (only Thornguard uses Strength, for damage, see
      // getDamageRange()) -- as of v0.11 it no longer grants HP for those two paths
      // either, so there's a real choice per point instead of Vitality always winning.
      this.bonus_hp_from_attributes+=(this.attributes.vit||0);
      this.bonus_stamina_from_attributes+=(this.attributes.vit||0);
      this.current_hp=this.getMaxHp(); leveled=true;
    }
    if(this.level>=Balance.LEVEL_CAP) this.xp=0;
    return leveled;
  },
  canAttemptTrial(){return this.level>=Balance.trialLevelRequirement(this.getClassData().tier||1);},
  gamblingUnlocked(){return this.highest_tier_reached>=2 || this.season_won;},
  getEyesightRadius(){
    let r=1;
    const gearBonus=this.gearBonus("eyesight");
    if(gearBonus>0) r=Math.max(r,gearBonus);
    if(this.eyesight_potion_steps_left>0) r=Math.max(r,2);
    return r;
  },
  resolveMasterTrial(success){
    const currentTier=this.getClassData().tier||1;
    const nextId=DL.getNextClassId(this.class_id);
    const result={success, final_tier:nextId===""};
    if(success){
      this.highest_tier_reached=Math.max(this.highest_tier_reached,currentTier+1);
      if(nextId!=="") this.class_id=nextId; else this.season_won=true;
    }
    // failure: class_id unchanged, no demotion, per v0.7 fix
    this.level=1; this.xp=0; this.xp_to_next=Balance.xpRequiredForLevel(this.level);
    // A promotion (or even a failed attempt, since level always resets to 1 here) is a
    // fresh character sheet for whatever class_id ends up active: attributes reset to
    // that class's own level-1 base values, and the level-up HP/Stamina pools start over.
    this._resetAttributesToClassBase();
    this.current_hp=this.getMaxHp(); this.current_stamina=this.getMaxStamina();
    return result;
  },
  getEffectiveAreaLevel(bonus=0){return clampi(this.level+bonus, Balance.AREA_LEVEL_MIN, Balance.AREA_LEVEL_MAX);},
  consumePendingScrollBonus(){const b=this.pending_scroll_bonus; this.pending_scroll_bonus=0; return b;},
  useScroll(itemId){
    const item=DL.getItem(itemId);
    if(item.type!=="scroll") return false;
    if((this.consumables[itemId]||0)<=0) return false;
    this._removeConsumableOne(itemId);
    this.pending_scroll_bonus=item.level_bonus||0;
    return true;
  },
  applyXpShrineBuff(){ this.xp_buff_multiplier=Balance.SHRINE_XP_BUFF_MULT; this.xp_buff_encounters_left+=Balance.SHRINE_XP_BUFF_ENCOUNTERS; },
  tickXpBuff(){ if(this.xp_buff_encounters_left>0){ this.xp_buff_encounters_left--; if(this.xp_buff_encounters_left===0) this.xp_buff_multiplier=1.0; } },
  spendStamina(amount){
    if(this.stamina_shrine_buff>0){ const fromBuff=Math.min(this.stamina_shrine_buff,amount); this.stamina_shrine_buff-=fromBuff; amount-=fromBuff; }
    this.current_stamina=Math.max(0,this.current_stamina-amount);
  },
  restoreStamina(amount){ this.current_stamina=Math.min(this.getMaxStamina(),this.current_stamina+amount); },
  addStaminaShrineBuff(bonus){ this.current_stamina=this.getMaxStamina(); this.stamina_shrine_buff+=bonus; },
  addGold(amount){ this.gold=Math.max(0,Math.round(this.gold+amount*this.getGoldFindMult())); },
  // v0.12: softcore ("non-hardcore") death penalty. Returns {goldLost, itemsLost} so the
  // caller can tell the player exactly what happened, this is deliberately NOT a silent
  // penalty (players losing gear they didn't see an explanation for would look like a bug).
  applyDeathPenalty(){
    const pct=Balance.DEATH_GOLD_LOSS_MIN_PCT+Math.random()*(Balance.DEATH_GOLD_LOSS_MAX_PCT-Balance.DEATH_GOLD_LOSS_MIN_PCT);
    const goldLost=Math.round(this.gold*pct);
    this.gold=Math.max(0,this.gold-goldLost);
    const itemsLost=this._rollDeathItemLosses();
    this.current_hp=this.getMaxHp();
    this.resetKillStreak();
    return {goldLost,itemsLost};
  },
  // Whether anything is lost at all is a single Balance.DEATH_ITEM_LOSS_CHANCE (50%) roll.
  // If so, how MANY items is a geometric countdown -- keep flipping a 50/50 coin and adding
  // one more item for as long as it comes up heads -- which naturally produces exactly the
  // falloff asked for: 50% of "something lost" cases lose just 1 item, 25% lose 2, 12.5%
  // lose 3, 6.25% lose 4, and so on, capped so a truly disastrous run can't wipe everything.
  _rollDeathItemLosses(){
    const lost=[];
    if(Math.random()>=Balance.DEATH_ITEM_LOSS_CHANCE) return lost;
    let count=1;
    while(Math.random()<0.5 && count<Balance.DEATH_ITEM_LOSS_MAX_COUNT) count++;
    for(let i=0;i<count;i++){
      const desc=this._loseOneRandomItem();
      if(!desc) break; // nothing left to lose
      lost.push(desc);
    }
    return lost;
  },
  // Each individual item lost is drawn from a weighted pool of "an equipped slot" (weight
  // 20) vs "a backpack gear item or consumable stack" (weight 30), mirroring the 20%/30%
  // split the odds were designed around, then a specific item is picked at random from
  // whichever pool won and removed.
  _loseOneRandomItem(){
    const equippedSlots=IF.EQUIPPED_SLOT_KEYS.filter(s=>this.equipped[s]);
    const consumableIds=Object.keys(this.consumables).filter(k=>this.consumables[k]>0);
    const nonEquippedCount=this.gear_instances.length+consumableIds.length;
    const pools=[];
    if(equippedSlots.length) pools.push({weight:Balance.DEATH_EQUIPPED_LOSS_WEIGHT,kind:"equipped"});
    if(nonEquippedCount) pools.push({weight:Balance.DEATH_BACKPACK_LOSS_WEIGHT,kind:"backpack"});
    if(pools.length===0) return null;
    const totalWeight=pools.reduce((s,p)=>s+p.weight,0);
    let r=Math.random()*totalWeight, chosen=pools[pools.length-1].kind;
    for(const p of pools){ if(r<p.weight){ chosen=p.kind; break; } r-=p.weight; }
    if(chosen==="equipped"){
      const slot=equippedSlots[randi(equippedSlots.length)];
      const inst=this.equipped[slot];
      this.equipped[slot]=null;
      return `${IF.displayName(inst)} (equipped)`;
    }
    // backpack: gear and consumable stacks share one flat pool so a character with 1 gear
    // item and 1 potion stack has even odds between them, not skewed by stack count.
    const backpackChoices=this.gear_instances.map((inst,idx)=>({type:"gear",idx})).concat(consumableIds.map(id=>({type:"consumable",id})));
    if(backpackChoices.length===0) return null;
    const choice=backpackChoices[randi(backpackChoices.length)];
    if(choice.type==="gear"){
      const inst=this.gear_instances[choice.idx];
      this.gear_instances.splice(choice.idx,1);
      return IF.displayName(inst);
    }
    const qtyLost=this.consumables[choice.id];
    delete this.consumables[choice.id];
    return `${DL.getItem(choice.id).name} x${qtyLost}`;
  },
  incrementKillStreak(){ this.kill_streak++; },
  resetKillStreak(){ this.kill_streak=0; },
  handleDeath(cause){
    if(this.hardcore){
      const cd=this.getClassData();
      const entry={name:this.character_name, class_name:cd.display_name||this.class_id, level:this.level, cause, date:new Date().toISOString()};
      appendGraveyard(entry);
      if(this.current_slot>=0) deleteSave(this.current_slot, entry);
      this.current_slot=-1;
      return {dead:true,penalty:null};
    }
    const penalty=this.applyDeathPenalty();
    return {dead:false,penalty};
  },
  addConsumable(itemId,count=1){ this.consumables[itemId]=(this.consumables[itemId]||0)+count; },
  _removeConsumableOne(itemId){ const rem=(this.consumables[itemId]||0)-1; if(rem>0) this.consumables[itemId]=rem; else delete this.consumables[itemId]; },
  useConsumable(itemId){
    if(!this.canUseConsumable(itemId)) return false;
    const item=DL.getItem(itemId); let used=false;
    if((item.heal_amount||0)>0 && this.current_hp<this.getMaxHp()){ this.current_hp=Math.min(this.getMaxHp(),this.current_hp+item.heal_amount); used=true; }
    if((item.stamina_amount||0)>0 && this.current_stamina<this.getMaxStamina()){ this.current_stamina=Math.min(this.getMaxStamina(),this.current_stamina+item.stamina_amount); used=true; }
    if((item.eyesight_steps||0)>0){ this.eyesight_potion_steps_left=item.eyesight_steps; used=true; }
    if(used) this._removeConsumableOne(itemId);
    return used;
  },
  canUseConsumable(itemId){
    if((this.consumables[itemId]||0)<=0) return false;
    const item=DL.getItem(itemId);
    if((item.heal_amount||0)>0 && this.current_hp<this.getMaxHp()) return true;
    if((item.stamina_amount||0)>0 && this.current_stamina<this.getMaxStamina()) return true;
    if((item.eyesight_steps||0)>0) return true;
    return false;
  },
  bestAvailableConsumable(kind){
    const field=kind==="health"?"heal_amount":"stamina_amount";
    let bestId="", bestAmt=-1;
    for(const itemId in this.consumables){
      if((this.consumables[itemId]||0)<=0) continue;
      const item=DL.getItem(itemId);
      if(item.type!=="consumable") continue;
      const amt=item[field]||0;
      if(amt<=0) continue;
      if(amt>bestAmt){ bestAmt=amt; bestId=itemId; }
    }
    return bestId;
  },
  buyConsumable(itemId){
    const item=DL.getItem(itemId); if(!item.name) return false;
    const price=Balance.itemBuyPrice(item);
    if(this.gold<price) return false;
    this.gold-=price; this.addConsumable(itemId); return true;
  },
  getInventoryCapacity(){
    let cap=Balance.BASE_INVENTORY_SLOTS;
    for(const bagId of this.equipped_bags) cap+=DL.getItem(bagId).capacity||0;
    return cap;
  },
  getInventoryUsed(){return this.gear_instances.length;},
  hasInventorySpace(){return this.getInventoryUsed()<this.getInventoryCapacity();},
  equipBag(itemId){
    if(this.equipped_bags.length>=Balance.MAX_BAG_SLOTS) return {success:false,reason:`Your bag rack is full (${this.equipped_bags.length}/${Balance.MAX_BAG_SLOTS}), unequip a bag first.`};
    this.equipped_bags.push(itemId); return {success:true};
  },
  unequipBag(itemId){ const idx=this.equipped_bags.indexOf(itemId); if(idx!==-1) this.equipped_bags.splice(idx,1); },
  buyBag(itemId){
    const item=DL.getItem(itemId); if(!item.name||item.type!=="bag") return {success:false,reason:"Unknown bag."};
    const price=Balance.bagBuyPrice(item.capacity||0);
    if(this.gold<price) return {success:false,reason:"Not enough gold."};
    const result=this.equipBag(itemId); if(!result.success) return result;
    this.gold-=price; return {success:true};
  },
  craftBag(itemId){
    const item=DL.getItem(itemId); if(!item.name||item.type!=="bag") return {success:false,reason:"Unknown bag."};
    const cost=Balance.bagCraftCost(item.capacity||0);
    if(this.materials<cost) return {success:false,reason:"Not enough materials."};
    const result=this.equipBag(itemId); if(!result.success) return result;
    this.materials-=cost; return {success:true};
  },
  addGear(inst){ if(!this.hasInventorySpace()) return false; this.gear_instances.push(inst); return true; },
  findGearIndex(instanceId){ return this.gear_instances.findIndex(g=>g.instance_id===instanceId); },
  equipGear(instanceId){
    const idx=this.findGearIndex(instanceId); if(idx===-1) return;
    const inst=this.gear_instances[idx]; const genSlot=inst.slot; let target=genSlot;
    if(genSlot==="ring"){
      if(!this.equipped["ring1"]) target="ring1"; else if(!this.equipped["ring2"]) target="ring2"; else target="ring1";
    } else if(!IF.EQUIPPED_SLOT_KEYS.includes(genSlot)) return;
    this.gear_instances.splice(idx,1);
    if(this.equipped[target]) this.gear_instances.push(this.equipped[target]);
    this.equipped[target]=inst;
    this.current_hp=Math.min(this.current_hp,this.getMaxHp());
  },
  unequipSlot(slot){ if(!this.equipped[slot]) return; this.gear_instances.push(this.equipped[slot]); this.equipped[slot]=null; },
  wouldSwap(inst){
    if(inst.slot==="ring") return !!(this.equipped["ring1"] && this.equipped["ring2"]);
    return !!this.equipped[inst.slot];
  },
  salvageGear(instanceId){
    const idx=this.findGearIndex(instanceId); if(idx===-1) return;
    const inst=this.gear_instances[idx];
    this.materials+=Balance.salvageValue(inst.tier, IF.slotCount(inst));
    this.gear_instances.splice(idx,1);
  },
  sellGear(instanceId){
    const idx=this.findGearIndex(instanceId); if(idx===-1) return;
    const inst=this.gear_instances[idx];
    this.addGold(Balance.sellValue(inst.tier, IF.slotCount(inst)));
    this.gear_instances.splice(idx,1);
  },
  rerollGear(instanceId){
    const idx=this.findGearIndex(instanceId); if(idx===-1) return null;
    const inst=this.gear_instances[idx];
    const cost=Balance.rerollCost(inst.tier, IF.slotCount(inst));
    if(this.materials<cost) return null;
    this.materials-=cost; const rerolled=IF.reroll(inst); this.gear_instances[idx]=rerolled; return rerolled;
  },
  addHerb(herbId,count=1){ this.herbs[herbId]=(this.herbs[herbId]||0)+count; },
  canAffordRecipe(recipe){ for(const h in recipe.herbs) if((this.herbs[h]||0)<recipe.herbs[h]) return false; return true; },
  brewRecipe(recipe){
    if(!this.canAffordRecipe(recipe)) return false;
    for(const h in recipe.herbs) this.herbs[h]-=recipe.herbs[h];
    this.addConsumable(recipe.result_item); return true;
  },

  startNewCharacter(classId,name,slot,isHardcore){
    this.current_slot=slot; this.class_id=classId;
    this.character_name=(name||"Hero").slice(0,Balance.CHARACTER_NAME_MAX_LEN);
    this.hardcore=isHardcore; this.level=1; this.xp=0; this.gold=20; this.materials=0;
    this.herbs={}; this.consumables={}; this.gear_instances=[]; this.equipped={};
    for(const s of IF.EQUIPPED_SLOT_KEYS) this.equipped[s]=null;
    this.equipped_bags=[]; this.pending_scroll_bonus=0; this.xp_buff_multiplier=1.0;
    this.xp_buff_encounters_left=0; this.stamina_shrine_buff=0.0; this.highest_tier_reached=1;
    this.season_won=false; this.kill_streak=0; this.xp_to_next=Balance.xpRequiredForLevel(this.level);
    this.lifetime_xp=0; this.isRestingAtCampfire=false; this.eyesight_potion_steps_left=0;
    this.max_maze_depth_reached=1;
    // Fresh character: brand new weapon-skill progression, NOT the reused-singleton's
    // previous character's progress (same bug class as the HP/Stamina fix just below --
    // PS is one shared object across character creations in a session, so anything not
    // explicitly reset here would otherwise leak from whatever was played last).
    this.weapon_skills={}; this.ensureWeaponSkills();
    // Bug fix (v0.12): this MUST run before getMaxHp()/getMaxStamina() below. PS is a
    // reused singleton across character creations in the same session, so bonus_hp_from_
    // attributes/bonus_stamina_from_attributes/attributes still held whatever the last-
    // played character (e.g. a high-Vitality one) left behind until this reset runs. Any
    // brand new character created without a full page reload was inheriting that stale
    // Vitality bonus into its starting HP/Stamina (this is what produced Gwen's ~430 HP /
    // ~418 Stamina level-1 Thornguard report).
    this._resetAttributesToClassBase();
    this.current_hp=this.getMaxHp(); this.current_stamina=this.getMaxStamina();
  },
  saveGame(){
    if(this.current_slot<0) return;
    const data={class_id:this.class_id,class_display_name:this.getClassData().display_name||this.class_id,
      character_name:this.character_name,hardcore:this.hardcore,level:this.level,
      xp:this.xp,xp_to_next:this.xp_to_next,gold:this.gold,materials:this.materials,herbs:this.herbs,
      current_hp:this.current_hp,current_stamina:this.current_stamina,consumables:this.consumables,
      gear_instances:this.gear_instances,equipped:this.equipped,equipped_bags:this.equipped_bags,
      highest_tier_reached:this.highest_tier_reached,season_won:this.season_won,lifetime_xp:this.lifetime_xp,
      eyesight_potion_steps_left:this.eyesight_potion_steps_left,
      max_maze_depth_reached:this.max_maze_depth_reached,
      attributes:this.attributes,unspent_stat_points:this.unspent_stat_points,
      bonus_hp_from_attributes:this.bonus_hp_from_attributes,bonus_stamina_from_attributes:this.bonus_stamina_from_attributes,
      weapon_skills:this.weapon_skills};
    if(Net.online) Net.saveCharacter(this.current_slot, data);
    else Storage_.setItem(SAVE_KEY(this.current_slot), JSON.stringify(data));
  },
  _applyLoadedData(slot,parsed){
    this.current_slot=slot; this.class_id=parsed.class_id||""; this.character_name=parsed.character_name||"Hero";
    this.hardcore=!!parsed.hardcore; this.kill_streak=0; this.level=parsed.level||1; this.xp=parsed.xp||0;
    this.xp_to_next=parsed.xp_to_next||Balance.xpRequiredForLevel(this.level); this.gold=parsed.gold||0;
    this.materials=parsed.materials||0; this.herbs=parsed.herbs||{}; this.consumables=parsed.consumables||{};
    this.gear_instances=(parsed.gear_instances||[]).filter(g=>g&&g.instance_id);
    const loadedEquipped=parsed.equipped||{}; this.equipped={};
    for(const s of IF.EQUIPPED_SLOT_KEYS) this.equipped[s]=loadedEquipped[s]||null;
    this.equipped_bags=(parsed.equipped_bags||[]).slice(0,Balance.MAX_BAG_SLOTS);
    this.highest_tier_reached=parsed.highest_tier_reached||1; this.season_won=!!parsed.season_won;
    this.pending_scroll_bonus=0; this.xp_buff_multiplier=1.0; this.xp_buff_encounters_left=0; this.stamina_shrine_buff=0.0;
    this.lifetime_xp=parsed.lifetime_xp||0; this.isRestingAtCampfire=false;
    this.eyesight_potion_steps_left=parsed.eyesight_potion_steps_left||0;
    this.max_maze_depth_reached=parsed.max_maze_depth_reached||1;
    if(parsed.attributes){ this.attributes={str:parsed.attributes.str||0,dex:parsed.attributes.dex||0,vit:parsed.attributes.vit||0,int:parsed.attributes.int||0}; }
    else this._resetAttributesToClassBase(); // pre-v0.10 save with no attributes recorded yet
    this.unspent_stat_points=parsed.unspent_stat_points||0;
    this.bonus_hp_from_attributes=parsed.bonus_hp_from_attributes||0;
    this.bonus_stamina_from_attributes=parsed.bonus_stamina_from_attributes||0;
    this.current_hp=parsed.current_hp!=null?parsed.current_hp:this.getMaxHp();
    this.current_stamina=parsed.current_stamina!=null?parsed.current_stamina:this.getMaxStamina();
    // v0.12: weapon skill progression is permanent and per-character, never reset by
    // anything -- a save with no weapon_skills yet (pre-v0.12) just starts everyone at 0.
    this.weapon_skills=parsed.weapon_skills||{};
    this.ensureWeaponSkills();
    return true;
  },
  loadGame(slot){
    if(Net.online){
      const entry=(Net.cache||[]).find(e=>e.slot===slot);
      if(!entry || entry.empty) return false;
      return this._applyLoadedData(slot, entry.data);
    }
    const parsed=loadSaveRaw(slot); if(!parsed) return false;
    return this._applyLoadedData(slot, parsed);
  },
};

/* ---------- GameFlow-equivalent (screen router) ---------- */

const NO_REGEN_SCREENS_ON_LEAVE=["town","inventory","merchant","alchemist","blacksmith","auctionHouse"];

const GF = {
  screen:"authGate", selected_slot:-1, pending_delete_slot:-1,
  pending_monster_id:"", pending_area_level:1,
  pending_chest_hits_required:3, pending_chest_tier:1, pending_chest_area_level:1,
  overworld_snapshot:null,
  chatOpen:false, inventory_return_to:"town",
  brewing:null, brewInterval:null, crafting:null, craftInterval:null,
  trialJustFailed:false, trialFailedPlankIndex:null, trialFailedStepIndex:-1,
  ventureDepth:null, mazeOverlay:null, gambleReveal:null,
  admin_token:"", admin_leaderboard_cache:null, admin_leaderboard_error:"",
  attributesCollapsed:false, leaderboardPage:null,
  goto(screen, extra={}){
    Object.assign(this, extra);
    if(PS.isRestingAtCampfire && !NO_REGEN_SCREENS_ON_LEAVE.includes(screen)) PS.isRestingAtCampfire=false;
    this.screen=screen; render();
  },
};

/* ---------- Tiny DOM helper ---------- */

function h(tag, attrs={}, children=[]){
  const e=document.createElement(tag);
  for(const k in attrs){
    const v=attrs[k];
    if(k==="style") Object.assign(e.style, v);
    else if(k==="html") e.innerHTML=v;
    else if(k==="class") e.className=v;
    else if(k.startsWith("on") && typeof v==="function") e.addEventListener(k.slice(2).toLowerCase(), v);
    else if(v!==false && v!=null) e.setAttribute(k, v===true?"":v);
  }
  const kids=Array.isArray(children)?children:[children];
  for(const c of kids){
    if(c==null) continue;
    e.appendChild((typeof c==="string"||typeof c==="number")?document.createTextNode(String(c)):c);
  }
  return e;
}
function bar(pct, cls, compact){ return h("div",{class:"bar-bg"+(compact?" compact":"")},[h("div",{class:"bar-fill "+cls, style:{width:clampf(pct,0,100)+"%"}})]); }
function iconBadge(svg, size){ const d=h("div",{class:"icon-badge",style:size?{width:size+"px",height:size+"px"}:{}}); d.innerHTML=svg; return d; }

function chatLogEntries(){
  const entries=[];
  for(const m of Net.chatMessages) entries.push({t:new Date(m.created_at).getTime(), node:h("div",{},[h("span",{class:"muted"},[`[${new Date(m.created_at).toLocaleTimeString()}] `]), h("span",{style:{fontWeight:"bold"}},[m.username+": "]), m.message])});
  for(const m of Net.privateMessages) entries.push({t:new Date(m.created_at).getTime(), node:h("div",{class:"chat-private-msg"},[h("span",{class:"muted"},[`[${new Date(m.created_at).toLocaleTimeString()}] `]), h("span",{style:{fontWeight:"bold"}},["System: "]), m.message])});
  entries.sort((a,b)=>a.t-b.t);
  return entries.map(e=>e.node);

function chatBody(closeBtn){
  Net.ensureChat();
  const log=h("div",{class:"panel",style:{flex:"1",overflowY:"auto",display:"flex",flexDirection:"column",gap:"4px",marginBottom:"8px"}},chatLogEntries());
  const input=h("input",{type:"text",placeholder:"Say something...",style:{flex:"1"}});
  const send=()=>{ const msg=input.value.trim(); if(!msg) return; Net.sendChat(msg); input.value=""; };
  input.addEventListener("keydown",(e)=>{ if(e.key==="Enter") send(); });
  const root=h("div",{style:{display:"flex",flexDirection:"column",height:"100%"}},[
    h("div",{class:"row",style:{justifyContent:"space-between",marginBottom:"8px"}},[h("h2",{style:{margin:0}},["Global Chat"]), closeBtn?h("span",{class:"linklike",onClick:closeBtn},["Close ✕"]):null]),
    log,
    h("div",{class:"row"},[input, h("button",{onClick:send},["Send"])]),
  ]);
  // Using requestAnimationFrame (not setTimeout) here matters: rAF runs before the
  // browser's next paint, so the scroll position is corrected before anything is drawn.
  // A setTimeout(fn,0) instead lets one frame paint at scrollTop=0 first (top of the
  // log) and then jump to the bottom on the next tick, that's the flicker players
  // saw on every maze step while chat was open (any full re-render rebuilds this div).
  requestAnimationFrame(()=>{ log.scrollTop=log.scrollHeight; });
  return root;
}

function chatPanel(){

/* ---------- shared in-app confirm popup, replaces window.confirm()/window.prompt() ----------
   Deliberately rendered into its own #modalRoot node OUTSIDE #app, instead of going through
   the normal render()/GF.goto() full-teardown cycle. A lot of the callers (e.g. the hardcore
   checkbox mid-form on the character creation screen) need to show this without wiping out
   whatever the player has already typed into the current screen, which a full render() would
   do since every screen function builds fresh DOM nodes from scratch. Call askConfirm(message,
   onConfirm, opts) to open it; closeConfirmModal() (called automatically on either button, or
   on backdrop click) tears down just the modal layer. */
function closeConfirmModal(){ modalRoot.innerHTML=""; }
function askConfirm(message,onConfirm,opts={}){
  const confirmLabel=opts.confirmLabel||"Confirm", cancelLabel=opts.cancelLabel||"Cancel";
  const danger=opts.danger!==false, onCancel=opts.onCancel||null;
  modalRoot.innerHTML="";
  modalRoot.appendChild(h("div",{class:"modal-backdrop",onClick:(e)=>{ if(e.target===e.currentTarget) closeConfirmModal(); }},[
    h("div",{class:"modal-box"},[
      h("div",{style:{lineHeight:"1.5"}},[message]),
      h("div",{class:"row"},[
        h("button",{onClick:()=>{ closeConfirmModal(); if(onCancel) onCancel(); }},[cancelLabel]),
        h("button",{class:danger?"danger":"",onClick:()=>{ closeConfirmModal(); onConfirm(); }},[confirmLabel]),
      ]),
    ]),
  ]));
}

function toastBox(){

}
function setToast(msg){ GF.toast=msg; }

/* Some feedback (like settling in at the bonfire) doesn't deserve a toast: a toast panel
   pushes the whole Town layout down for a second and back up once it's cleared, which
   reads as a flicker/bug on a screen that otherwise never changes size. Routing it into
   the chat log (as a local "System:" line, the same private-message style already used
   for server notifications) gives the same feedback without touching page layout at all. */
function pushSystemChatMessage(message){
  if(Net.online){
    Net.privateMessages.push({created_at:new Date().toISOString(), message});
  } else {
    setToast(message); // no chat log to write into offline; fall back to the toast
  }
}

/* ---------- Autosave: there is no manual save button. Progress is persisted after every
   meaningful action (combat rounds, maze steps/events, vendor transactions, campfire regen
   ticks) instead of on a fixed timer, so idle sessions don't spam the server with no-op saves. ---------- */
function autosave(){ if(PS.current_slot>=0) PS.saveGame(); }
window.addEventListener("beforeunload",()=>{ if(PS.current_slot>=0) PS.saveGame(); });

const BREW_CRAFT_MS=2000;
function startBrew(recipe){
  if(GF.brewing || !PS.canAffordRecipe(recipe)) return;
  GF.brewing={recipeId:recipe.result_item, startedAt:Date.now(), recipe};
  render();
  GF.brewInterval=setInterval(()=>{
    if(!GF.brewing){ clearInterval(GF.brewInterval); GF.brewInterval=null; return; }
    if(Date.now()-GF.brewing.startedAt>=BREW_CRAFT_MS){
      clearInterval(GF.brewInterval); GF.brewInterval=null;
      const rec=GF.brewing.recipe; GF.brewing=null;
      const result=DL.getItem(rec.result_item);
      if(PS.brewRecipe(rec)){ autosave(); setToast(`Brewed ${result.name}!`); }
      render();
    } else render();
  },100);
}
function startCraftBag(itemId){
  const item=DL.getItem(itemId);
  const cost=Balance.bagCraftCost(item.capacity||0);
  if(GF.crafting || PS.materials<cost || PS.equipped_bags.length>=Balance.MAX_BAG_SLOTS) return;
  GF.crafting={itemId, startedAt:Date.now()};
  render();
  GF.craftInterval=setInterval(()=>{
    if(!GF.crafting){ clearInterval(GF.craftInterval); GF.craftInterval=null; return; }
    if(Date.now()-GF.crafting.startedAt>=BREW_CRAFT_MS){
      clearInterval(GF.craftInterval); GF.craftInterval=null;
      const id=GF.crafting.itemId; GF.crafting=null;
      const r=PS.craftBag(id);
      if(r.success){ autosave(); setToast(`Crafted ${DL.getItem(id).name}!`); } else setToast(r.reason);
      render();
    } else render();
  },100);
}

// Aggregates every consumable into "N health potions"/"N stamina potions" (collapsing
// the small/greater tiers together, since at a glance players care about the running
// total more than the split) plus any other consumables (elixirs, scrolls) by name.
// Used only in the compact character-detail preview -- the full Inventory screen still
// lists each stack individually since its Use buttons need the specific item id.
function aggregatedConsumableParts(){
  let healthTotal=0, staminaTotal=0; const otherParts=[];
  for(const itemId of Object.keys(PS.consumables)){
    const qty=PS.consumables[itemId]; if(qty<=0) continue;
    const item=DL.getItem(itemId);
    if(item.heal_amount) healthTotal+=qty;
    else if(item.stamina_amount) staminaTotal+=qty;
    else otherParts.push(`${qty}x ${item.name}`);
  }
  const parts=[];
  if(healthTotal>0) parts.push(`${healthTotal} health potion${healthTotal===1?"":"s"}`);
  if(staminaTotal>0) parts.push(`${staminaTotal} stamina potion${staminaTotal===1?"":"s"}`);
  parts.push(...otherParts);
  return parts;
}

function inventoryPreview(){
  const equippedCount=IF.EQUIPPED_SLOT_KEYS.filter(s=>PS.equipped[s]).length;
  const consumableParts=aggregatedConsumableParts();
  const herbParts=Object.keys(PS.herbs).filter(k=>PS.herbs[k]>0).map(k=>`${PS.herbs[k]}x ${DL.getHerb(k).name}`);
  return h("div",{class:"col gap",style:{flex:"1",minWidth:"0"}},[
    h("div",{class:"muted"},[`Equipped: ${equippedCount}/${IF.EQUIPPED_SLOT_KEYS.length}`]),
    h("div",{class:"muted"},[`Backpack: ${PS.getInventoryUsed()}/${PS.getInventoryCapacity()}`]),
    h("div",{class:"muted"},[`Bags: ${PS.equipped_bags.length}/${Balance.MAX_BAG_SLOTS}`]),
    h("div",{class:"muted",style:{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},[consumableParts.length?`Consumables: ${consumableParts.join(", ")}`:"Consumables: none"]),
    h("div",{class:"muted",style:{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},[herbParts.length?`Herbs: ${herbParts.join(", ")}`:"Herbs: none"]),
  ]);
}

function classChainEntries(chainId){
  return Object.entries(CLASSES).filter(([id,c])=>c.chain===chainId).sort((a,b)=>a[1].tier-b[1].tier);
}

// Small square badge shown left of each path's title, marking that chain's primary
// damage/attribute stat at a glance: a textured square (soft fill, darker border, a
// corner dot in each corner) with a colored nature-themed glyph inside -- a rock for
// Thornguard's Strength, and a leaf (in each chain's own hue) for the two Dexterity/
// Intelligence-driven paths.
function primaryAttrBadgeSvg(chainId){
  const palette={
    wizard:{bg:"#2a2450",border:"#6a53c9",fg:"#9d86f5"},      // blue/purple -- Intelligence
    thornguard:{bg:"#3a2420",border:"#9c453a",fg:"#d1594a"},  // red -- Strength
    windrider:{bg:"#1f3520",border:"#4a8a45",fg:"#6cc466"},   // green -- Dexterity
  }[chainId]||{bg:"#2c2c2c",border:"#666",fg:"#999"};
  const glyph=chainId==="thornguard"
    ? `<path d="M20,8 L30,15 L27,30 L13,30 L10,15 Z" fill="${palette.fg}" stroke="${palette.border}" stroke-width="1.4" stroke-linejoin="round"/>
       <path d="M20,8 L20,17 L27,30 M20,17 L13,30" fill="none" stroke="${palette.border}" stroke-width="1" opacity="0.55"/>`
    : `<path d="M20,9 C29,10 31,20 25,27 C21,32 15,31 13,26 C8,18 11,10 20,9 Z" fill="${palette.fg}" stroke="${palette.border}" stroke-width="1.3" stroke-linejoin="round"/>
       <path d="M20,10 C19,17 19,24 15,29" fill="none" stroke="${palette.border}" stroke-width="1" opacity="0.6"/>`;
  return `<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
    <rect x="2" y="2" width="36" height="36" rx="7" fill="${palette.bg}" stroke="${palette.border}" stroke-width="2"/>
    <circle cx="7.5" cy="7.5" r="1.5" fill="${palette.border}"/>
    <circle cx="32.5" cy="7.5" r="1.5" fill="${palette.border}"/>
    <circle cx="7.5" cy="32.5" r="1.5" fill="${palette.border}"/>
    <circle cx="32.5" cy="32.5" r="1.5" fill="${palette.border}"/>
    ${glyph}
  </svg>`;
}

function screenLeaderboard(){
  const root=h("div",{});
  root.appendChild(h("h2",{},["Leaderboard"]));
  root.appendChild(h("div",{class:"lore"},["The road is long, and in the end, it's only with yourself. But still, here is a list of players outperforming you."]));

    root.appendChild(h("button",{onClick:()=>GF.goto("mainMenuSlots")},["← Back"]));
    return root;
  }
  const entries=Net.leaderboardCache;
  if(entries.length===0) root.appendChild(h("div",{class:"muted"},["No one has made a mark yet, be the first!"]));

  const totalPages=Math.max(1,Math.ceil(entries.length/LEADERBOARD_PAGE_SIZE));

  const pageEntries=entries.slice(pageStart,pageStart+LEADERBOARD_PAGE_SIZE);

  if(entries.length>0) root.appendChild(h("div",{class:"muted",style:{marginBottom:"8px"}},[`${entries.length} player${entries.length===1?"":"s"} on the board.`]));

  pageEntries.forEach((e,i)=>{

    const isMine=e.player===Net.username;
    const isDead=!!e.is_dead;
    const style={marginBottom:"6px",justifyContent:"space-between"};
    if(e.hardcore){ style.borderColor="#e0b23d"; style.borderWidth="2px"; }
    if(isMine){ style.background="#20304a"; }
    if(isDead){ style.opacity="0.6"; }
    const nameStyle={fontWeight:"bold"};
    root.appendChild(h("div",{class:"tile row",style},[
      h("div",{},[
        h("span",{class:"muted"},[`#${idx+1} `]),
        isDead?h("span",{style:{marginRight:"4px"},title:"Fallen"},["🪦"]):null,
        h("span",{style:nameStyle},[`${e.character_name}`]),
        h("span",{class:"muted"},[` (${e.player})`]),
        e.hardcore?h("span",{style:{color:"#e0b23d",fontWeight:"bold"}},[" [Hardcore]"]):null,
      ]),
      h("div",{class:"muted"},[`Lv ${e.level} ${e.class_name} (Tier ${e.highest_tier_reached}), ${e.lifetime_xp||0} Experience, ${e.gold} Gold`]),
    ]));
  });

  if(totalPages>1){
    root.appendChild(h("div",{class:"row gap",style:{alignItems:"center",justifyContent:"center",marginTop:"10px"}},[
      h("button",{disabled:GF.leaderboardPage<=0,onClick:()=>{ GF.leaderboardPage--; render(); }},["← Prev"]),
      h("span",{class:"muted"},[`Page ${GF.leaderboardPage+1} of ${totalPages}`]),
      h("button",{disabled:GF.leaderboardPage>=totalPages-1,onClick:()=>{ GF.leaderboardPage++; render(); }},["Next →"]),
    ]));
  }

  root.appendChild(h("button",{style:{marginTop:"10px"},onClick:()=>GF.goto("mainMenuSlots")},["← Back"]));
  return root;
}

function getVentureDepth(){
  const max=PS.max_maze_depth_reached||1;
  if(GF.ventureDepth==null || GF.ventureDepth<1){
    GF.ventureDepth=max;
  } else if(max>(GF.lastKnownMaxDepth||1)){
    // A new max depth was just unlocked (reached a fresh exit since we last checked) --
    // default the venture depth up to it immediately, same as a brand new character
    // would start at their max. Without this, the selector stayed frozen at whatever
    // depth was picked before, even though + could still manually reach the new max.
    GF.ventureDepth=max;
  } else if(GF.ventureDepth>max){
    GF.ventureDepth=max; // safety clamp, e.g. a stale/loaded value above the real max
  }
  GF.lastKnownMaxDepth=max;
  return GF.ventureDepth;
}
