/* ================= MAZE / OVERWORLD ================= */

const MAZE_W=20, MAZE_H=10;

function generateMaze(depth){
  const size=MAZE_W, sizeH=MAZE_H;
  const idx=(x,y)=>y*size+x;
  const dirs4=[[1,0],[-1,0],[0,1],[0,-1]];

  // Terrain, obstruction placement, and reachability are regenerated together and
  // retried if the layout doesn't leave enough open ground, boulders sit at up to
  // 25% density now, so this retry loop matters more than it used to.
  let cells, dist;
  for(let attempt=0;attempt<40;attempt++){
    cells=[];
    for(let y=0;y<sizeH;y++) for(let x=0;x<size;x++) cells.push({x,y,type:"dirt",baseTerrain:"dirt",discovered:false,cleared:false});

    // Cosmetic grass patches (tall grass = "hides mobs" flavor; dirt = plain path).
    // Both are freely walkable, monster encounters only trigger on grass tiles.
    for(let p=0;p<Balance.GRASS_PATCH_COUNT;p++){
      let cx=randi(size), cy=randi(sizeH);
      const patchSize=3+randi(4);
      for(let s=0;s<patchSize;s++){
        if(cx>=0&&cx<size&&cy>=0&&cy<sizeH){ cells[idx(cx,cy)].type="grass"; cells[idx(cx,cy)].baseTerrain="grass"; }
        const [ddx,ddy]=pick(dirs4); cx+=ddx; cy+=ddy;
      }
    }

    // Boulders: impassable whole tiles (not walls between tiles), any two
    // 4-directionally adjacent non-boulder cells are always mutually reachable.
    for(const c of cells){
      if(c.x===0&&c.y===0) continue; // never block the starting tile itself
      if(Math.random()<Balance.OBSTACLE_DENSITY) c.type="boulder";
    }

    // BFS reachability (4-directional, boulders block) from the start tile.
    dist=new Array(cells.length).fill(-1);
    dist[0]=0; const q=[0];
    while(q.length){
      const cur=q.shift();
      const cx=cur%size, cy=Math.floor(cur/size);
      for(const [dx,dy] of dirs4){
        const nx=cx+dx, ny=cy+dy;
        if(nx<0||nx>=size||ny<0||ny>=sizeH) continue;
        const ni=idx(nx,ny);
        if(cells[ni].type==="boulder") continue;
        if(dist[ni]===-1){ dist[ni]=dist[cur]+1; q.push(ni); }
      }
    }
    const reachableCount=dist.filter(d=>d>=0).length;
    if(reachableCount>=cells.length*0.45) break; // good enough, keep this layout
  }

  cells[0].type="start"; cells[0].baseTerrain="start";
  let exitIdx=0, best=-1;
  for(let i=0;i<cells.length;i++) if(dist[i]>best){ best=dist[i]; exitIdx=i; }
  cells[exitIdx].type="exit";

  // Stronghold: one guaranteed 3x3 structure per maze (see placeStronghold), placed before
  // the ordinary per-tile content rolls below so its 9 cells are already spoken for -- the
  // chest/guardian cells get non-grass/dirt types so the `candidates` filter skips them
  // naturally, and the fence corners get their own type too so they can't be re-rolled
  // into a chest/shrine/trap on top of the stronghold.
  const stronghold=placeStronghold({size,sizeH,cells,depth}, dist, exitIdx);

  // Content only ever lands on reachable, plain (grass/dirt) tiles. Trapdoors and traps
  // stay visually indistinguishable from ordinary terrain (see TILE_GLYPH/TILE_COLOR),
  // so their placement doesn't need to avoid "obvious" spots the way it once did.
  // Each candidate tile gets one independent roll per content type, in order (a tile
  // that hits an earlier roll is taken and skips the rest), this replaces the old
  // fixed-count-per-maze model with true per-tile probabilities, so a big 25%-boulder
  // maze with very few open tiles naturally spawns less content too.
  const candidates=cells.filter((c,i)=>dist[i]>0 && (c.type==="grass"||c.type==="dirt"));
  for(const c of candidates){
    const roll=Math.random();
    if(roll<Balance.MAZE_CHEST_CHANCE_PER_TILE){ c.type="chest"; continue; }
    if(roll<Balance.MAZE_CHEST_CHANCE_PER_TILE+Balance.MAZE_SHRINE_CHANCE_PER_TILE){ c.type="shrine"; continue; }
    if(roll<Balance.MAZE_CHEST_CHANCE_PER_TILE+Balance.MAZE_SHRINE_CHANCE_PER_TILE+Balance.MAZE_HERB_CHANCE_PER_TILE){ c.type="herb"; continue; }
    if(roll<Balance.MAZE_CHEST_CHANCE_PER_TILE+Balance.MAZE_SHRINE_CHANCE_PER_TILE+Balance.MAZE_HERB_CHANCE_PER_TILE+Balance.MAZE_TRAPDOOR_CHANCE_PER_TILE){ c.type="trapdoor"; c.wasHidden=true; continue; }
    if(roll<Balance.MAZE_CHEST_CHANCE_PER_TILE+Balance.MAZE_SHRINE_CHANCE_PER_TILE+Balance.MAZE_HERB_CHANCE_PER_TILE+Balance.MAZE_TRAPDOOR_CHANCE_PER_TILE+Balance.TRAP_CHANCE_PER_TILE){ c.type="trap"; c.wasHidden=true; }
  }

  const maze={size, sizeH, cells, depth, playerIdx:0, stronghold};
  revealAround(maze,0,PS.getEyesightRadius()); // see your own starting neighborhood immediately
  return maze;
}

// Picks a 3x3 anchor point whose all 9 cells are reachable, not the start tile, and not
// the exit tile, then carves in: center = locked chest, N/S/W/E = tough guardian monsters,
// the 4 diagonal corners = purely decorative "broken fencing" (never a real obstacle --
// per Gwen's explicit requirement, a boulder ever landing on a corner here could wall off
// the only route around the chest, which would be a soft-lock bug, not a puzzle). Returns
// null on the astronomically rare chance no valid anchor is found in 80 tries, in which
// case this one maze simply generates without a stronghold rather than risk corrupting
// the start/exit tiles.
function placeStronghold(maze, dist, exitIdx){
  const {size, sizeH, cells}=maze;
  const idx=(x,y)=>y*size+x;
  const dirs4=[[1,0],[-1,0],[0,1],[0,-1]];
  let chosen=null;
  for(let attempt=0;attempt<200;attempt++){
    const cx=1+randi(size-2), cy=1+randi(sizeH-2);
    const coords=[[cx,cy],[cx,cy-1],[cx,cy+1],[cx-1,cy],[cx+1,cy],[cx-1,cy-1],[cx+1,cy-1],[cx-1,cy+1],[cx+1,cy+1]];
    const idxs=coords.map(([x,y])=>idx(x,y));
    if(idxs.includes(0) || idxs.includes(exitIdx)) continue;
    // Virtual reachability check: treat the whole 3x3 candidate block as walkable (it
    // will be once carved -- chest/guardian/fence tiles are never boulders), and ask
    // whether the start can reach ANY of its 9 cells through the existing layout. This
    // lets the stronghold carve straight through boulders instead of requiring a lucky
    // boulder-free 3x3 patch, which was leaving a meaningful fraction of mazes with no
    // stronghold at all under the old all-9-cells-must-already-be-open approach.
    const inBlock=new Set(idxs);
    const vDist=new Array(cells.length).fill(-1);
    vDist[0]=0; const q=[0];
    while(q.length){
      const cur=q.shift();
      const curx=cur%size, cury=Math.floor(cur/size);
      for(const [dx,dy] of dirs4){
        const nx=curx+dx, ny=cury+dy;
        if(nx<0||nx>=size||ny<0||ny>=sizeH) continue;
        const ni=ny*size+nx;
        if(vDist[ni]!==-1) continue;
        if(cells[ni].type==="boulder" && !inBlock.has(ni)) continue;
        vDist[ni]=vDist[cur]+1; q.push(ni);
      }
    }
    if(idxs.some(i=>vDist[i]>=0)){ chosen={cx,cy}; break; }
  }
  if(!chosen) return null;
  const {cx,cy}=chosen;
  const chestIdx=idx(cx,cy);
  const guardianCoords=[[cx,cy-1],[cx,cy+1],[cx-1,cy],[cx+1,cy]]; // N, S, W, E
  const cornerCoords=[[cx-1,cy-1],[cx+1,cy-1],[cx-1,cy+1],[cx+1,cy+1]];

  cells[chestIdx].type="stronghold_chest"; cells[chestIdx].cleared=false;
  const guardianIdxs=[];
  guardianCoords.forEach(([gx,gy],slot)=>{
    const gi=idx(gx,gy);
    const base=DL.pickRandomMonsterForArea(maze.depth||1);
    cells[gi].type="stronghold_guardian"; cells[gi].cleared=false;
    cells[gi].guardianMonsterId=base.id; cells[gi].guardianSlot=slot;
    guardianIdxs.push(gi);
  });
  cornerCoords.forEach(([fx,fy])=>{ cells[idx(fx,fy)].type="stronghold_fence"; });

  return {chestIdx, guardianIdxs, guardianDefeated:[false,false,false,false], opened:false};
}
function strongholdChestUnlocked(maze){
  return !!(maze.stronghold && maze.stronghold.guardianDefeated.some(Boolean));
}

function ensureMaze(depth){
  if(!GF.overworld_snapshot || GF.overworld_snapshot.depth!==depth) GF.overworld_snapshot=generateMaze(depth);
  return GF.overworld_snapshot;
}

// Trap and trapdoor tiles are deliberately absent here, they render using the cell's
// baseTerrain instead (see screenMaze), so they're indistinguishable from ordinary ground.
const TILE_GLYPH={start:"🏕",exit:"⬇",chest:"🎁",shrine:"✨",herb:"🌿",boulder:"🪨",grass:"",dirt:"",
  stronghold_chest:"🔒",stronghold_guardian:"💀",stronghold_fence:"🪵"};
const TILE_COLOR={start:"#2a4a2a",exit:"#3a3a6a",chest:"#5a4a1a",shrine:"#3a5a5a",herb:"#2a4a2a",boulder:"#3a3a34",grass:"#274a1e",dirt:"#4a3a26",
  stronghold_chest:"#5a4a1a",stronghold_guardian:"#6a1e1e",stronghold_fence:"#4a3a26"};
const HIDDEN_TILE_TYPES=["trap","trapdoor"];

function isAdjacent4(x1,y1,x2,y2){
  const dx=Math.abs(x1-x2), dy=Math.abs(y1-y2);
  return (dx+dy)===1;
}

function mazeOverlayScreen(overlay){
  const div=h("div",{class:"maze-overlay-grid"},[h("div",{class:"maze-overlay-text"},[overlay.text])]);
  if(!overlay.timerStarted){
    overlay.timerStarted=true;
    setTimeout(()=>{ div.classList.add("fade"); },50);
    setTimeout(()=>{
      GF.mazeOverlay=null;
      if(overlay.andThen) overlay.andThen();
      else render();
    },1650);
  }
  return div;
}

function screenMaze(){
  const depth=GF.maze_depth||PS.level;
  const maze=ensureMaze(depth);
  const root=h("div",{});
  root.appendChild(h("h2",{},[`The Woods, Area Level ${depth}`]));
  root.appendChild(h("div",{class:"lore"},["Overgrown paths wind between the trees. Move with the arrow keys or by clicking an adjacent tile."]));
  const t=toastBox(); if(t) root.appendChild(t);
  root.appendChild(statHeader());

  // Grid pixel size (tiles + 1px gaps + 2px border on each side), the dramatic
  // Advanced!/Trapdoor! overlay is sized to exactly cover this box, not the full
  // viewport, so it reads as "something happened on the grid" rather than a
  // jarring full-screen takeover.
  const gridWidthPx=maze.size*34+(maze.size-1)*1+4;
  const gridHeightPx=maze.sizeH*34+(maze.sizeH-1)*1+4;

  let gridArea;
  if(GF.mazeOverlay){
    gridArea=h("div",{style:{position:"relative",width:gridWidthPx+"px",height:gridHeightPx+"px",flex:"none"}},[mazeOverlayScreen(GF.mazeOverlay)]);
  } else {
    const px=maze.playerIdx%maze.size, py=Math.floor(maze.playerIdx/maze.size);
    const grid=h("div",{class:"maze-grid",style:{gridTemplateColumns:`repeat(${maze.size},34px)`}});
    for(let y=0;y<maze.sizeH;y++){
      for(let x=0;x<maze.size;x++){
        const i=y*maze.size+x; const cell=maze.cells[i];
        const isPlayer=maze.playerIdx===i;
        const chestLocked=cell.type==="stronghold_chest" && !strongholdChestUnlocked(maze);
        const isWalkable=!isPlayer && cell.type!=="boulder" && !chestLocked && isAdjacent4(x,y,px,py);
        const isKnown=cell.discovered || cell.type==="exit" || cell.type==="start";
        const hidden=!!cell.wasHidden || HIDDEN_TILE_TYPES.includes(cell.type);
        const displayType=HIDDEN_TILE_TYPES.includes(cell.type)?cell.baseTerrain:cell.type;
        let bg="#050505", label="", border="1px solid #222", opacity="1";
        if(isPlayer){ bg="#e0c96a"; }
        else if(isKnown){
          bg=TILE_COLOR[displayType]||TILE_COLOR.dirt;
          label=TILE_GLYPH[displayType]||"";
          if(cell.cleared && !hidden) opacity="0.4"; // hidden tiles never visually change, even once triggered
        }
        const inner=h("span",{style:{opacity}},[label]);
        const tile=h("div",{class:"maze-tile",style:{background:bg,display:"flex",alignItems:"center",justifyContent:"center",cursor:isWalkable?"pointer":"default",fontSize:"16px",border}},[inner]);
        if(isWalkable){ tile.addEventListener("click",()=>onStepMaze(maze,i)); }
        grid.appendChild(tile);
      }
    }
    gridArea=grid;
  }

  root.appendChild(h("div",{class:"maze-wrap"},[gridArea,
    h("div",{class:"side-panel"},[
      h("div",{class:"col",style:{gap:"2px"}},[
        h("div",{class:"muted",style:{lineHeight:"1.5em"}},["Use the arrow keys to explore the wilderness. Wild creatures lure at you from the tall grass, reach the exit (⬇) before your stamina runs out. Every area hides a Stronghold too: a locked chest (🔒) guarded on 4 sides by tough guardians (💀), beat one to reach the chest, but you'll need a Stronghold Key to actually open it."]),
      ]),
      h("div",{class:"row gap"},[
        h("button",{disabled:!PS.canUseConsumable(PS.bestAvailableConsumable("health")),onClick:()=>{ PS.useConsumable(PS.bestAvailableConsumable("health")); autosave(); render(); }},["Use Health Potion"]),
        h("button",{disabled:!PS.canUseConsumable(PS.bestAvailableConsumable("stamina")),onClick:()=>{ PS.useConsumable(PS.bestAvailableConsumable("stamina")); autosave(); render(); }},["Use Stamina Potion"]),
      ]),
      h("button",{onClick:()=>GF.goto("town")},["← Retreat to Town"]),
    ]),
  ]));
  return root;
}

function revealAround(maze,centerIdx,radius){
  const cx=centerIdx%maze.size, cy=Math.floor(centerIdx/maze.size);
  for(let dy=-radius;dy<=radius;dy++){
    for(let dx=-radius;dx<=radius;dx++){
      const nx=cx+dx, ny=cy+dy;
      if(nx<0||nx>=maze.size||ny<0||ny>=maze.sizeH) continue;
      maze.cells[ny*maze.size+nx].discovered=true;
    }
  }
}

function tickEyesightPotion(){
  if(PS.eyesight_potion_steps_left>0){
    PS.eyesight_potion_steps_left--;
  }
}

function onStepMaze(maze,targetIdx){
  // Exhaustion is checked BEFORE moving, and no longer force-teleports the player to
  // town: that gave no chance to react (e.g. drink a Stamina Potion via the maze's
  // quick-use buttons) and always left current_stamina at a suspicious flat 25 (a
  // hardcoded 25% of the BASE stamina pool, ignoring any +stamina_max gear). Now the
  // player simply can't take another step once truly out of stamina, and has to
  // either use a potion or walk themselves back with "Retreat to Town".
  if(PS.current_stamina<=0){
    setToast("You're exhausted and can't go any further. Use a Stamina Potion, or retreat to town to rest.");
    render();
    return;
  }
  const cell=maze.cells[targetIdx];
  maze.playerIdx=targetIdx; cell.discovered=true; cell.visited=true;
  PS.spendStamina(Balance.STAMINA_COST_PER_STEP);
  PS.tickXpBuff();
  tickEyesightPotion();
  revealAround(maze,targetIdx,PS.getEyesightRadius());
  if(PS.current_stamina<=0){
    setToast("You're exhausted. Use a Stamina Potion, or retreat to town to rest, before you can move again.");
  }

  if(cell.type==="exit" && !cell.cleared){
    cell.cleared=true;
    const nextDepth=maze.depth+Balance.EXIT_DEPTH_BONUS_PER_DESCENT;
    PS.max_maze_depth_reached=Math.max(PS.max_maze_depth_reached||1, nextDepth);
    autosave();
    GF.mazeOverlay={text:`Advanced to area level ${nextDepth}!`, andThen:()=>{ GF.overworld_snapshot=null; GF.goto("maze",{maze_depth:nextDepth}); }};
    render();
    return;
  }
  if(cell.type==="trapdoor" && !cell.cleared){
    cell.cleared=true; cell.type=cell.baseTerrain; // reverts to ordinary grass/dirt from here on, mechanically too
    const dmg=randRange(Balance.TRAP_DAMAGE_MIN,Balance.TRAP_DAMAGE_MAX);
    PS.current_hp=Math.max(1,PS.current_hp-dmg);
    PS.spendStamina(Balance.TRAP_STAMINA_LOSS);
    autosave();
    const fallDepth=Math.max(1,maze.depth-Balance.TRAPDOOR_DEPTH_PENALTY);
    GF.mazeOverlay={text:"Trapdoor!", andThen:()=>{ GF.overworld_snapshot=null; GF.goto("maze",{maze_depth:fallDepth}); }};
    render();
    return;
  }
  if(cell.type==="trap" && !cell.cleared){
    cell.cleared=true; cell.type=cell.baseTerrain;
    const dmg=randRange(Balance.TRAP_DAMAGE_MIN,Balance.TRAP_DAMAGE_MAX);
    PS.current_hp=Math.max(1,PS.current_hp-dmg);
    PS.spendStamina(Balance.TRAP_STAMINA_LOSS);
    setToast(`Something bites at your ankle! You take ${Math.round(dmg)} damage.`);
    autosave(); render(); return;
  }
  if(cell.type==="shrine" && !cell.cleared){
    cell.cleared=true;
    if(Math.random()<0.5){ PS.addStaminaShrineBuff(Balance.STAMINA_MAX_BASE*Balance.SHRINE_STAMINA_BUFF_PCT); setToast("A quiet shrine restores your stamina and grants a lasting reserve!"); }
    else { PS.applyXpShrineBuff(); setToast("A quiet shrine blesses you, bonus experience for a while!"); }
    autosave(); render(); return;
  }
  if(cell.type==="herb" && !cell.cleared){
    GF.goto("herbEncounter",{maze_depth:maze.depth, herb_cell_idx:targetIdx});
    return;
  }
  if(cell.type==="chest" && !cell.cleared){
    GF.goto("chestEncounter",{maze_depth:maze.depth, chest_cell_idx:targetIdx});
    return;
  }
  if(cell.type==="stronghold_guardian" && !cell.cleared){
    GF.goto("combat",{maze_depth:maze.depth, pending_monster_id:cell.guardianMonsterId, pending_guardian_cell_idx:targetIdx});
    return;
  }
  if(cell.type==="stronghold_chest" && !cell.cleared){
    // Only reachable at all once isWalkable's chestLocked check has cleared (see
    // screenMaze/keydown handler), i.e. at least one guardian is already down.
    GF.goto("strongholdChest",{maze_depth:maze.depth, stronghold_chest_cell_idx:targetIdx});
    return;
  }

  // Monsters only lurk in tall grass, dirt paths and other special tiles are always safe.
  if(cell.type==="grass" && Math.random()<Balance.ENCOUNTER_CHANCE_PER_STEP){
    const monster=DL.pickRandomMonsterForArea(maze.depth);
    // Bug fix (v0.12): pending_guardian_cell_idx MUST be explicitly cleared here. GF.goto
    // only Object.assign()s the keys it's given, so a leftover guardian-cell index from a
    // PREVIOUS Stronghold fight this session would otherwise still be sitting on GF and
    // get picked up by ensureCombat()'s isGuardian check for this completely unrelated,
    // ordinary grass encounter -- that's what was turning every regular mob into a
    // "Guardian" (with the tripled HP and Stronghold Key drop chance) once you'd fought
    // even one real guardian.
    GF.goto("combat",{maze_depth:maze.depth, pending_monster_id:monster.id, pending_guardian_cell_idx:null});
    return;
  }
  autosave();
  render();
}

window.addEventListener("keydown",(e)=>{
  if(GF.screen!=="maze") return;
  const keyMap={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0]};
  const d=keyMap[e.key]; if(!d) return;
  const maze=GF.overworld_snapshot; if(!maze) return;
  e.preventDefault();
  const px=maze.playerIdx%maze.size, py=Math.floor(maze.playerIdx/maze.size);
  const nx=px+d[0], ny=py+d[1];
  if(nx<0||nx>=maze.size||ny<0||ny>=maze.sizeH) return;
  const ni=ny*maze.size+nx;
  if(maze.cells[ni].type==="boulder") return;
  if(maze.cells[ni].type==="stronghold_chest" && !strongholdChestUnlocked(maze)) return;
  onStepMaze(maze,ni);
});


/* ================= COMBAT ================= */

function ensureCombat(){
  const guardianCellIdx=GF.pending_guardian_cell_idx!=null?GF.pending_guardian_cell_idx:null;
  if(!GF.combat || GF.combat.monster_id!==GF.pending_monster_id || GF.combat.guardianCellIdx!==guardianCellIdx){
    const base=DL.getMonster(GF.pending_monster_id);
    const streakMult=Balance.killStreakStatMult(PS.kill_streak);
    // Stronghold guardians (v0.12): same per-area-level damage as an ordinary monster,
    // but Balance.STRONGHOLD_GUARDIAN_HP_MULT (3x) more HP, per Gwen's spec: "extra
    // strong mobs... damage quite equal to regular mobs".
    const isGuardian=guardianCellIdx!=null;
    const hpMult=(isGuardian?Balance.STRONGHOLD_GUARDIAN_HP_MULT:1)*streakMult;
    const maxHp=Balance.monsterHp(base.base_hp,GF.maze_depth)*hpMult;
    GF.combat={monster_id:base.id, name:isGuardian?`Guardian ${base.name}`:base.name, hp:maxHp, maxHp, dmgMin:Balance.monsterDamage(base.base_damage_min,GF.maze_depth)*streakMult, dmgMax:Balance.monsterDamage(base.base_damage_max,GF.maze_depth)*streakMult, xp:Balance.monsterXpReward(base.base_xp,GF.maze_depth), goldMin:base.gold_min, goldMax:base.gold_max, loot_table:base.loot_table, log:[], isGuardian, guardianCellIdx};
  }
  return GF.combat;
}

function combatLog(cb,msg){ cb.log.push(msg); if(cb.log.length>5) cb.log.shift(); }

function grantLoot(lootTable, mult){
  const loot=DL.rollLoot(lootTable);
  if(loot.type==="gear"){
    const tier=Balance.itemTierForAreaLevel(GF.maze_depth);
    const inst=IF.generate(tier);
    if(PS.addGear(inst)) return `Found ${IF.displayName(inst)}!`;
    return `Found gear but your bags are full, it was left behind.`;
  }
  if(loot.type==="consumable"){ PS.addConsumable(loot.item_id,1); return `Found a ${DL.getItem(loot.item_id).name}.`; }
  if(loot.type==="herb"){ PS.addHerb(loot.herb_id,1); return `Found ${DL.getHerb(loot.herb_id).name}.`; }
  return "";
}

function endCombatDeath(){
  const wasHardcore=PS.hardcore;
  const monsterName=GF.combat.name;
  const cd=PS.getClassData();
  const announcePayload={character_name:PS.character_name, level:PS.level, class_name:cd.display_name||PS.class_id, cause:`been slain by a ${monsterName}`};
  const result=PS.handleDeath(`Slain by a ${monsterName}`);
  GF.combat=null;
  if(result.dead){
    setToast("Your journey ends here. A new entry has been added to the Graveyard.");
    Net.announceDeath(announcePayload);
    GF.goto("mainMenuSlots");
  }
  else {
    // v0.12: spell out exactly what the death penalty took, so losing gear on death
    // doesn't read as a bug -- see PS.applyDeathPenalty/_rollDeathItemLosses.
    const p=result.penalty;
    let msg=`You were defeated and wake up back at camp, having lost ${p.goldLost} gold.`;
    if(p.itemsLost.length>0) msg+=` You also lost: ${p.itemsLost.join(", ")}.`;
    setToast(msg);
    PS.saveGame();
    GF.goto("town");
  }
}

function screenCombat(){
  const cb=ensureCombat();
  const root=h("div",{});
  root.appendChild(h("h2",{},[cb.defeated?`The ${cb.name} lies defeated.`:`A wild ${cb.name} blocks the path!`]));
  root.appendChild(statHeader());

  const portraitWrap=h("div",{style:{width:"140px",height:"140px",margin:"0 auto 8px"}});
  portraitWrap.innerHTML=monsterPortrait(cb.monster_id,{slain:cb.defeated});
  const mobPanel=h("div",{class:"panel",style:{flex:"0 0 50%",maxWidth:"50%"}},[
    portraitWrap,
    h("div",{style:{fontWeight:"bold",textAlign:"center"}},[cb.name]),
    h("div",{style:{textAlign:"center"}},[`HP ${Math.round(Math.max(0,cb.hp))}/${Math.round(cb.maxHp)}`]),
    bar(Math.max(0,cb.hp)/cb.maxHp*100,"bar-hp"),
  ]);
  const logDiv=h("div",{class:"muted panel",style:{flex:"1",minWidth:"0",minHeight:"70px"}},cb.log.map(l=>h("div",{},[l])));
  root.appendChild(h("div",{class:"row",style:{alignItems:"flex-start",gap:"14px"}},[mobPanel,logDiv]));

  if(cb.defeated){
    root.appendChild(h("div",{class:"panel",style:{background:"#2a3a20",borderColor:"#5a7a3a",margin:"12px 0"}},[cb.result_text]));
    root.appendChild(h("div",{class:"row"},[
      h("button",{onClick:()=>{ GF.combat=null; GF.goto("maze",{maze_depth:GF.maze_depth}); }},["Continue Wandering"]),
    ]));
    return root;
  }

  function playerTurn(){
    const [lo,hi]=PS.getDamageRange();
    let dmg=randRange(lo,hi);
    const crit=Math.random()<PS.getCritChance();
    if(crit) dmg*=Balance.CRIT_MULTIPLIER;
    cb.hp-=dmg;
    combatLog(cb,`You hit the ${cb.name} for ${Math.round(dmg)} damage${crit?" (Critical!)":""}.`);
    // v0.12: every attack with a recognized weapon type equipped counts toward that
    // type's permanent proficiency (see PS.registerWeaponHit/getEquippedWeaponType).
    const weaponType=PS.getEquippedWeaponType();
    if(weaponType){
      const skillResult=PS.registerWeaponHit(weaponType);
      if(skillResult.leveledUp) combatLog(cb,`Your ${IF.WEAPON_TYPE_LABELS[weaponType]} proficiency reaches level ${skillResult.newLevel}!`);
    }
    if(cb.hp<=0){
      cb.hp=0;
      const streakMult=Balance.killStreakLootMult(PS.kill_streak);
      const gold=randIntRange(cb.goldMin,cb.goldMax)*streakMult;
      const leveled=PS.addXp(cb.xp*streakMult);
      PS.addGold(gold);
      PS.incrementKillStreak();
      const lootMsg=grantLoot(cb.loot_table, streakMult);
      cb.defeated=true;
      cb.result_text=`${cb.name} defeated! +${Math.round(cb.xp*streakMult)} XP, +${Math.round(gold)} gold. ${lootMsg}`;
      if(cb.isGuardian){
        // v0.12: beating a Stronghold guardian opens the direct path to that Stronghold's
        // chest (any 1 of the 4 is enough), and has its own independent 5% chance to drop
        // a Stronghold Key -- the only way to actually unlock the chest once you reach it.
        const maze=GF.overworld_snapshot;
        if(maze){
          const cell=maze.cells[cb.guardianCellIdx];
          if(cell){ cell.cleared=true; }
          if(maze.stronghold && cell && cell.guardianSlot!=null) maze.stronghold.guardianDefeated[cell.guardianSlot]=true;
        }
        // v0.12 bug fix: keys only drop in an area at or above the character's own level,
        // so a high-level character can't revisit a trivial low-level maze and farm
        // guaranteed-easy guardian kills for keys (see Balance.strongholdKeyEligible).
        const keyEligible=Balance.strongholdKeyEligible(GF.maze_depth, PS.level);
        if(keyEligible && Math.random()<Balance.STRONGHOLD_KEY_DROP_CHANCE){
          PS.addConsumable("stronghold_key",1);
          cb.result_text+=" It drops a Stronghold Key!";
        } else if(keyEligible){
          cb.result_text+=" The path to the Stronghold's chest is open, if you can find a key.";
        } else {
          cb.result_text+=" The path to the Stronghold's chest is open, though this area is too tame for its guardians to yield a Stronghold Key.";
        }
      }
      autosave();
      render();
      return;
    }
    // monster turn
    if(Math.random()<PS.getBlockChance()){
      combatLog(cb,`You block the ${cb.name}'s attack entirely!`);
      autosave(); render(); return;
    }
    let mdmg=randRange(cb.dmgMin,cb.dmgMax);
    mdmg*=(1.0-PS.getArmor());
    PS.current_hp-=mdmg;
    combatLog(cb,`The ${cb.name} hits you for ${Math.round(mdmg)} damage.`);
    // Anything below 1 HP is dead, a fractional sliver (e.g. 0.4) used to display as
    // "0 HP" and read as alive, letting players survive a fight at what looked like 0 HP
    // only to be one-shot next encounter. Treat "rounds down to 0" as actually dead.
    if(PS.current_hp<1){ PS.current_hp=0; endCombatDeath(); return; }
    autosave();
    render();
  }

  root.appendChild(h("div",{class:"row",style:{marginTop:"10px"}},[
    h("button",{class:"play",onClick:playerTurn},["Attack"]),
    h("button",{disabled:!PS.canUseConsumable(PS.bestAvailableConsumable("health")),onClick:()=>{ PS.useConsumable(PS.bestAvailableConsumable("health")); autosave(); render(); }},["Use Health Potion"]),
    h("button",{disabled:!PS.canUseConsumable(PS.bestAvailableConsumable("stamina")),onClick:()=>{ PS.useConsumable(PS.bestAvailableConsumable("stamina")); autosave(); render(); }},["Use Stamina Potion"]),
    h("button",{class:"danger",onClick:()=>{ GF.combat=null; PS.saveGame(); setToast("You flee back to camp, but remember your way through these woods."); GF.goto("town"); }},["Flee"]),
  ]));
  return root;
}

/* ================= CHEST ================= */

function ensureChest(){
  if(!GF.chest || GF.chest.cell_idx!==GF.chest_cell_idx){
    GF.chest={cell_idx:GF.chest_cell_idx, hits_required:randIntRange(Balance.CHEST_HITS_MIN,Balance.CHEST_HITS_MAX), hits_done:0};
  }
  return GF.chest;
}

function screenChest(){
  const chest=ensureChest();
  const root=h("div",{});
  root.appendChild(h("h2",{},["A weathered chest, bound in vines"]));
  root.appendChild(statHeader());
  root.appendChild(h("div",{class:"panel"},[
    h("div",{},[`Pry it open: ${chest.hits_done}/${chest.hits_required} hits`]),
    bar(chest.hits_done/chest.hits_required*100,"bar-gold"),
  ]));
  root.appendChild(h("div",{class:"row"},[
    h("button",{class:"play",onClick:()=>{
      chest.hits_done++;
      if(chest.hits_done>=chest.hits_required){
        const tier=Balance.itemTierForAreaLevel(GF.maze_depth);
        const mult=Balance.CHEST_LOOT_MULTIPLIER;
        let msgs=[];
        const g1=grantLoot("epic",mult); if(g1) msgs.push(g1);
        if(Math.random()<Balance.CHEST_SCROLL_CHANCE){
          const scroll=pick(["scroll_of_challenge_1","scroll_of_challenge_2","scroll_of_challenge_3"]);
          PS.addConsumable(scroll,1); msgs.push(`Found a ${DL.getItem(scroll).name}!`);
        }
        const goldFound=Math.round(randIntRange(10,30)*mult);
        PS.addGold(goldFound); msgs.push(`+${goldFound} gold.`);
        if(GF.overworld_snapshot) GF.overworld_snapshot.cells[chest.cell_idx].cleared=true;
        GF.chest=null; PS.saveGame();
        setToast("The chest creaks open! "+msgs.join(" "));
        GF.goto("maze",{maze_depth:GF.maze_depth});
        return;
      }
      render();
    }},["Pry it open"]),
    h("button",{onClick:()=>{ GF.chest=null; GF.goto("maze",{maze_depth:GF.maze_depth}); }},["Leave it"]),
  ]));
  return root;
}

/* ================= STRONGHOLD CHEST ================= */
// The reward for clearing a Stronghold: reachable only once >=1 of the 4 guardians is
// down (see strongholdChestUnlocked/onStepMaze), and only actually openable with a
// Stronghold Key (see the guardian kill-reward roll in screenCombat's playerTurn).

function screenStrongholdChest(){
  const root=h("div",{});
  const maze=GF.overworld_snapshot;
  const cellIdx=GF.stronghold_chest_cell_idx;
  root.appendChild(h("h2",{},["A locked Stronghold chest"]));
  root.appendChild(h("div",{class:"lore"},["Iron-bound and half-buried in roots. Whatever the guardians were protecting, it's still in here."]));
  const t=toastBox(); if(t) root.appendChild(t);
  root.appendChild(statHeader());

  const keyCount=PS.consumables["stronghold_key"]||0;
  if(keyCount<=0){
    root.appendChild(h("div",{class:"panel"},["This chest is sealed tight, you'll need a Stronghold Key to open it. Guardians have a small chance to drop one when defeated."]));
    root.appendChild(h("div",{class:"row"},[
      h("button",{onClick:()=>{ GF.goto("maze",{maze_depth:GF.maze_depth}); }},["Leave it"]),
    ]));
    return root;
  }

  root.appendChild(h("div",{class:"panel"},[`You have ${keyCount} Stronghold Key${keyCount===1?"":"s"}. Use one to open this chest?`]));
  root.appendChild(h("div",{class:"row"},[
    h("button",{class:"play",onClick:()=>{
      PS._removeConsumableOne("stronghold_key");
      const tier=Balance.itemTierForAreaLevel(GF.maze_depth);
      const msgs=[];

      const gearCount=randIntRange(Balance.STRONGHOLD_CHEST_GEAR_COUNT_MIN,Balance.STRONGHOLD_CHEST_GEAR_COUNT_MAX);
      let gearFound=0, gearLeftBehind=0;
      for(let i=0;i<gearCount;i++){
        const inst=IF.generate(tier,"",pick(["Rare","Epic"]));
        if(PS.addGear(inst)) gearFound++; else gearLeftBehind++;
      }
      msgs.push(`${gearFound} rare/epic item${gearFound===1?"":"s"} of gear`+(gearLeftBehind>0?` (${gearLeftBehind} left behind, bags full)`:""));

      const goldFound=randIntRange(Balance.STRONGHOLD_CHEST_GOLD_MIN,Balance.STRONGHOLD_CHEST_GOLD_MAX);
      PS.addGold(goldFound); msgs.push(`${goldFound} gold`);

      const herbTotal=randIntRange(Balance.STRONGHOLD_CHEST_HERBS_MIN,Balance.STRONGHOLD_CHEST_HERBS_MAX);
      for(let i=0;i<herbTotal;i++) PS.addHerb(DL.pickHerbForNode(),1);
      msgs.push(`${herbTotal} herbs`);

      const potionTotal=randIntRange(Balance.STRONGHOLD_CHEST_POTIONS_MIN,Balance.STRONGHOLD_CHEST_POTIONS_MAX);
      let healthGiven=0, staminaGiven=0;
      for(let i=0;i<potionTotal;i++){ if(Math.random()<0.5){ PS.addConsumable("health_potion",1); healthGiven++; } else { PS.addConsumable("stamina_potion",1); staminaGiven++; } }
      msgs.push(`${healthGiven} health & ${staminaGiven} stamina potions`);

      if(Math.random()<Balance.STRONGHOLD_CHEST_SCROLL_CHANCE){
        const scroll=pick(["scroll_of_challenge_1","scroll_of_challenge_2","scroll_of_challenge_3"]);
        PS.addConsumable(scroll,1); msgs.push(DL.getItem(scroll).name);
      }
      if(Math.random()<Balance.STRONGHOLD_CHEST_EYESIGHT_CHANCE){
        PS.addConsumable("elixir_of_eyesight",1); msgs.push("an Elixir of Eyesight");
      }
      if(Math.random()<Balance.STRONGHOLD_CHEST_BAG_CHANCE){
        const bagIds=Object.keys(ITEMS).filter(id=>ITEMS[id].type==="bag");
        const bagId=pick(bagIds);
        const result=PS.equipBag(bagId);
        msgs.push(result.success?ITEMS[bagId].name:`${ITEMS[bagId].name} (couldn't fit, bag rack full)`);
      }

      if(maze){
        const cell=maze.cells[cellIdx];
        if(cell) cell.cleared=true;
        if(maze.stronghold) maze.stronghold.opened=true;
      }
      PS.saveGame();
      setToast("The chest creaks open! You find: "+msgs.join(", ")+".");
      GF.goto("maze",{maze_depth:GF.maze_depth});
    }},["Unlock with Key"]),
    h("button",{onClick:()=>{ GF.goto("maze",{maze_depth:GF.maze_depth}); }},["Leave it"]),
  ]));
  return root;
}

/* ================= HERB GATHERING ================= */

function ensureHerbNode(){
  if(!GF.herbNode || GF.herbNode.cell_idx!==GF.herb_cell_idx){
    GF.herbNode={cell_idx:GF.herb_cell_idx, herb_id:DL.pickHerbForNode(), ticks_required:randIntRange(2,4), ticks_done:0};
  }
  return GF.herbNode;
}

function screenHerbEncounter(){
  const node=ensureHerbNode();
  const herb=DL.getHerb(node.herb_id);
  const root=h("div",{});
  root.appendChild(h("h2",{},[herb.rare?`A rare bloom, ${herb.name}`:`Gathering ${herb.name}`]));
  root.appendChild(h("div",{class:"lore"},["Careful hands find more than hasty ones. No danger here, just patience."]));
  root.appendChild(statHeader());
  root.appendChild(h("div",{class:"panel"},[
    h("div",{},[`Gathering: ${node.ticks_done}/${node.ticks_required}`]),
    bar(node.ticks_done/node.ticks_required*100,"bar-xp"),
  ]));
  root.appendChild(h("div",{class:"row"},[
    h("button",{onClick:()=>{
      node.ticks_done++;
      if(node.ticks_done>=node.ticks_required){
        // v0.12: herb nodes are rarer than they used to be and cost a few clicks to work,
        // so the payout was bumped from a flat 1 up to a healthy 1-12 per node to make the
        // detour worth it.
        const qty=randIntRange(1,12);
        PS.addHerb(node.herb_id,qty);
        if(GF.overworld_snapshot) GF.overworld_snapshot.cells[node.cell_idx].cleared=true;
        GF.herbNode=null; autosave();
        setToast(`You gather ${qty}x ${herb.name}.`);
        GF.goto("maze",{maze_depth:GF.maze_depth});
        return;
      }
      render();
    }},["Gather"]),
    h("button",{onClick:()=>{ GF.herbNode=null; GF.goto("maze",{maze_depth:GF.maze_depth}); }},["Leave it"]),
  ]));
  return root;
}


/* ================= INVENTORY ================= */

function gearRow(inst, actions){
  return h("div",{class:"tile gear-row",style:{marginBottom:"6px"}},[
    gearIcon(inst),
    h("div",{class:"col",style:{flex:"1",minWidth:"0",gap:"2px"}},[
      h("div",{class:"tooltip rarity-"+inst.rarity,style:{fontWeight:"bold"},"data-tip":IF.tooltipText(inst)},[IF.displayName(inst)+` (T${inst.tier})`]),
      h("div",{class:"muted"},[IF.affixSummary(inst)]),
    ]),
    h("div",{class:"gear-row-actions"},actions),
  ]);
}

// Shared attribute-role copy: which stat drives damage for this class chain, and what
// the other three do for it. Used both on the Inventory's Attributes panel (live values)
// and the Player Classes screen (base values per class) so the wording always matches.
function attributeSummaryLines(chain){
  if(chain==="thornguard"){
    return [
      "Strength: +1 damage per point.",
      "Dexterity: +1% Block Chance per point, a chance to take 0 damage from a hit.",
      "Vitality: on every level-up, permanently adds that much HP and Stamina.",
      "Intelligence: no effect for this path.",
    ];
  }
  if(chain==="windrider"){
    return [
      "Strength: no effect for this path.",
      "Dexterity: +1 damage per point, and +1% Block Chance per point, a chance to take 0 damage from a hit.",
      "Vitality: on every level-up, permanently adds that much HP and Stamina.",
      "Intelligence: no effect for this path.",
    ];
  }
  if(chain==="wizard"){
    return [
      "Strength: no effect for this path.",
      "Dexterity: +1% Block Chance per point, a chance to take 0 damage from a hit.",
      "Vitality: on every level-up, permanently adds that much HP and Stamina.",
      "Intelligence: +1 damage per point.",
    ];
  }
  return [];
}

function attributesPanel(){
  const c=PS.getClassData();
  const rows=[{key:"str",label:"Strength",gearStat:"strength"},{key:"dex",label:"Dexterity",gearStat:"dexterity"},{key:"vit",label:"Vitality",gearStat:"vitality"},{key:"int",label:"Intelligence",gearStat:"intelligence"}];
  const summaryLines=attributeSummaryLines(c.chain);
  const collapsed=!!GF.attributesCollapsed;
  const body=[];
  if(!collapsed){
    body.push(...rows.map((r,i)=>{
      const gearAmt=PS.gearBonus(r.gearStat);
      return h("div",{class:"row",style:{justifyContent:"space-between",marginBottom:"4px",alignItems:"center"}},[
        h("div",{},[`${r.label}: ${PS.attributes[r.key]}`, gearAmt?h("span",{class:"muted"},[` (+${Math.round(gearAmt)} from gear)`]):null]),
        h("button",{disabled:PS.unspent_stat_points<=0,onClick:()=>{ PS.spendStatPoint(r.key); autosave(); render(); }},["+"]),
      ]);
    }));
    body.push(h("div",{class:"muted",style:{marginTop:"6px",lineHeight:"1.4em"}},summaryLines.map(l=>h("div",{},[l]))));
  }
  return h("div",{class:"panel",style:{marginTop:"12px",marginBottom:"12px",height:"100%"}},[
    h("div",{class:"row",style:{justifyContent:"space-between",marginBottom:collapsed?"0":"8px"}},[
      h("div",{style:{fontWeight:"bold"}},["Attributes"]),
      h("div",{class:"row gap",style:{alignItems:"center"}},[
        h("div",{class:PS.unspent_stat_points>0?"gold-text":"muted"},[PS.unspent_stat_points>0?`${PS.unspent_stat_points} point${PS.unspent_stat_points===1?"":"s"} to spend`:"No unspent points"]),
        h("button",{class:"attr-collapse-btn",title:collapsed?"Expand Attributes":"Collapse Attributes",onClick:()=>{ GF.attributesCollapsed=!GF.attributesCollapsed; render(); }},[collapsed?"▸":"▾"]),
      ]),
    ]),
    ...body,
  ]);
}

// v0.12: weapon-type proficiency card, sits between the top stat header and the
// Attributes/Gear Bonuses row on the Character Sheet. Shows every weapon type's
// permanent progress (0/100 and level 0 if you've never swung one), regardless of
// what's currently equipped -- see PS.getWeaponSkillProgress/getEquippedWeaponType.
function skillsBonusPanel(){
  const equippedType=PS.getEquippedWeaponType();
  const rows=IF.WEAPON_TYPE_LIST.map(t=>{
    const p=PS.getWeaponSkillProgress(t);
    const isEquipped=equippedType===t;
    const pct=p.hitsForNextLevel>0?(p.hitsIntoLevel/p.hitsForNextLevel*100):100;
    return h("div",{class:"row",style:{justifyContent:"space-between",alignItems:"center",marginBottom:"6px",gap:"10px"}},[
      h("div",{style:{minWidth:"70px",fontWeight:isEquipped?"bold":"normal"}},[IF.WEAPON_TYPE_LABELS[t]+(isEquipped?" ★":"")]),
      h("div",{style:{flex:"1"}},[bar(pct,"bar-xp",true)]),
      h("div",{class:"muted",style:{minWidth:"130px",textAlign:"right"}},[`Lv ${p.level} (${p.hitsIntoLevel}/${p.hitsForNextLevel})`]),
    ]);
  });
  return h("div",{class:"panel",style:{marginTop:"12px",marginBottom:"12px"}},[
    h("div",{style:{fontWeight:"bold",marginBottom:"8px"}},["Skill Bonuses"]),
    ...rows,
    h("div",{class:"muted",style:{marginTop:"8px",fontStyle:"italic"}},["Permanent. You can only get better -- weapon skill progress survives Broken Bridge promotions and season resets."]),
  ]);
}

function gearBonusPanel(){
  const lines=PS.getGearBonusLines();
  return h("div",{class:"panel",style:{marginTop:"12px",marginBottom:"12px",height:"100%"}},[
    h("div",{style:{fontWeight:"bold",marginBottom:"8px"}},["Gear Bonuses"]),
    lines.length===0?h("div",{class:"muted"},["No gear bonuses yet."]):
      h("div",{},lines.map(l=>h("div",{class:"muted",style:{marginBottom:"4px"}},[l]))),
  ]);
}

// Equipped slots arranged like a Diablo-style paper doll: head+amulet up top, weapon
// and shoulders flanking the chest armor, then gloves/rings/belt, pants, boots.
const EQUIP_DOLL_ROWS=[["head","amulet"],["weapon","shoulders","armor"],["gloves","ring1","belt","ring2"],["pants"],["boots"]];

function equipSlotTile(slot){
  const inst=PS.equipped[slot];
  return h("div",{class:"tile"},[
    h("div",{class:"muted"},[IF.slotLabel(slot)]),
    inst?h("div",{class:"row gap",style:{alignItems:"center"}},[gearIcon(inst,26), h("div",{class:"tooltip rarity-"+inst.rarity,"data-tip":IF.tooltipText(inst)},[IF.displayName(inst)+` (T${inst.tier})`])]):h("div",{class:"muted"},["(empty)"]),
    inst?h("button",{style:{marginTop:"6px"},onClick:()=>{PS.unequipSlot(slot);autosave();render();}},["Unequip"]):null,
  ]);
}

function screenInventory(){
  const root=h("div",{});
  root.appendChild(h("h2",{},["Character Sheet"]));
  const t=toastBox(); if(t) root.appendChild(t);
  root.appendChild(statHeader());
  root.appendChild(skillsBonusPanel());
  root.appendChild(h("div",{class:"row",style:{alignItems:"stretch",gap:"14px"}},[
    h("div",{style:{flex:"0 0 50%",maxWidth:"50%",minWidth:"0"}},[attributesPanel()]),
    h("div",{style:{flex:"1",minWidth:"0"}},[gearBonusPanel()]),
  ]));

  root.appendChild(h("h3",{style:{marginTop:"12px"}},["Equipped"]));
  const eqDoll=h("div",{class:"equip-doll"});
  for(const rowSlots of EQUIP_DOLL_ROWS){
    eqDoll.appendChild(h("div",{class:"equip-doll-row"},rowSlots.map(slot=>equipSlotTile(slot))));
  }
  root.appendChild(eqDoll);

  root.appendChild(h("h3",{},[`Backpack (${PS.getInventoryUsed()}/${PS.getInventoryCapacity()})`]));
  root.appendChild(h("div",{class:"muted",style:{marginBottom:"6px"}},["Visit the Blacksmith to salvage gear, or the Merchant to sell it."]));
  if(PS.gear_instances.length===0) root.appendChild(h("div",{class:"muted"},["Empty. Go find some loot in the woods."]));
  for(const inst of [...PS.gear_instances]){
    root.appendChild(gearRow(inst,[
      h("button",{onClick:()=>{PS.equipGear(inst.instance_id);autosave();render();}},[PS.wouldSwap(inst)?"Swap":"Equip"]),
    ]));
  }

  root.appendChild(h("h3",{},["Bags"]));
  root.appendChild(h("div",{class:"muted"},[`Equipped bags: ${PS.equipped_bags.length}/${Balance.MAX_BAG_SLOTS}`]));
  for(const bagId of [...PS.equipped_bags]){
    root.appendChild(h("div",{class:"row",style:{marginBottom:"4px"}},[DL.getItem(bagId).name, h("button",{onClick:()=>{PS.unequipBag(bagId);PS.saveGame();render();}},["Unequip"])]));
  }

  root.appendChild(h("h3",{},["Consumables"]));
  const consEntries=Object.keys(PS.consumables).filter(k=>PS.consumables[k]>0);
  if(consEntries.length===0) root.appendChild(h("div",{class:"muted"},["None."]));
  for(const itemId of consEntries){
    const item=DL.getItem(itemId);
    root.appendChild(h("div",{class:"row gap",style:{marginBottom:"4px",alignItems:"center",justifyContent:"space-between"}},[
      h("div",{class:"row gap",style:{alignItems:"center"}},[itemIcon(itemId,22), `${item.name} x${PS.consumables[itemId]}`]),
      item.type==="consumable"?h("button",{disabled:!PS.canUseConsumable(itemId),onClick:()=>{PS.useConsumable(itemId);autosave();render();}},["Use"]):
        h("button",{onClick:()=>{PS.useScroll(itemId);autosave();setToast(`${item.name} will boost your next descent by ${item.level_bonus} levels.`);render();}},["Use"]),
    ]));
  }

  root.appendChild(h("h3",{},["Herbs"]));
  const herbEntries=Object.keys(PS.herbs).filter(k=>PS.herbs[k]>0);
  if(herbEntries.length===0) root.appendChild(h("div",{class:"muted"},["None."]));
  for(const herbId of herbEntries){
    root.appendChild(h("div",{class:"row gap",style:{marginBottom:"4px",alignItems:"center"}},[herbIcon(herbId,22), `${DL.getHerb(herbId).name} x${PS.herbs[herbId]}`]));
  }

  root.appendChild(h("button",{style:{marginTop:"12px"},onClick:()=>GF.goto(GF.inventory_return_to||"town")},["← Back"]));
  return root;
}

/* ================= BLACKSMITH ================= */

function screenBlacksmith(){
  const root=h("div",{});
  root.appendChild(h("div",{class:"row gap"},[iconBadge(`<svg viewBox="0 0 40 40"><circle cx="20" cy="20" r="19" fill="#5a4028"/><rect x="10" y="26" width="20" height="6" rx="1" fill="#333"/></svg>`,52),h("div",{},[h("h2",{},[Balance.NPC_BLACKSMITH_NAME]),h("div",{class:"flavor"},["\"Bring me your battered gear. I'll see what can be salvaged, or improved.\""])])]));
  const t=toastBox(); if(t) root.appendChild(t);
  root.appendChild(statHeader());

  root.appendChild(h("h3",{},["Reroll Gear (uses materials)"]));
  if(PS.gear_instances.length===0) root.appendChild(h("div",{class:"muted"},["Bring gear from your backpack to reroll its bonuses."]));
  for(const inst of PS.gear_instances){
    const cost=Balance.rerollCost(inst.tier,IF.slotCount(inst));
    root.appendChild(gearRow(inst,[
      h("button",{disabled:PS.materials<cost,onClick:()=>{ const result=PS.rerollGear(inst.instance_id); if(result){autosave(); setToast(`Rerolled! You got a ${IF.displayName(result)}.`);} render(); }},[`Reroll (${cost} mat)`]),
      h("button",{onClick:()=>{PS.salvageGear(inst.instance_id);autosave();render();}},[`Salvage (+${Balance.salvageValue(inst.tier,IF.slotCount(inst))} mat)`]),
    ]));
  }

  root.appendChild(h("h3",{},["Craft Bags (uses materials)"]));
  root.appendChild(h("div",{class:"muted"},[`Materials: ${PS.materials}`]));
  const bagGrid=h("div",{class:"grid3"});
  for(const itemId in ITEMS){
    const item=ITEMS[itemId]; if(item.type!=="bag") continue;
    const cost=Balance.bagCraftCost(item.capacity);
    const craftingThis=GF.crafting && GF.crafting.itemId===itemId;
    const tileKids=[
      h("div",{class:"row gap",style:{alignItems:"center"}},[itemIcon(itemId), h("div",{style:{fontWeight:"bold"}},[item.name])]),
      h("div",{class:"muted"},[`Capacity +${item.capacity}`]),
    ];
    if(craftingThis){
      const elapsed=Date.now()-GF.crafting.startedAt;
      tileKids.push(h("div",{style:{marginTop:"6px"}},[bar(Math.min(100,elapsed/BREW_CRAFT_MS*100),"bar-brew")]));
    } else {
      tileKids.push(h("button",{style:{marginTop:"6px"},disabled:PS.materials<cost||PS.equipped_bags.length>=Balance.MAX_BAG_SLOTS||!!GF.crafting,onClick:()=>startCraftBag(itemId)},[`Craft (${cost} mat)`]));
    }
    bagGrid.appendChild(h("div",{class:"tile"},tileKids));
  }
  root.appendChild(bagGrid);
  root.appendChild(h("button",{style:{marginTop:"12px"},onClick:()=>GF.goto("town")},["← Back to Town"]));
  return root;
}

/* ================= ALCHEMIST ================= */

function screenAlchemist(){

  root.appendChild(h("h3",{},["Your Herbs"]));
  const herbEntries=Object.keys(PS.herbs).filter(k=>PS.herbs[k]>0);
  root.appendChild(h("div",{class:"muted"},[herbEntries.length?herbEntries.map(id=>`${DL.getHerb(id).name} x${PS.herbs[id]}`).join(", "):"None yet, gather herbs in the woods."]));

  root.appendChild(h("h3",{},["Recipes"]));

    const tileKids=[
      h("div",{class:"row gap",style:{alignItems:"center"}},[itemIcon(recipe.result_item), h("div",{style:{fontWeight:"bold"}},[result.name])]),
      h("div",{class:"muted"},[Object.keys(recipe.herbs).map(h2=>`${DL.getHerb(h2).name} x${recipe.herbs[h2]}`).join(", ")]),
    ];
    if(brewingThis){
      const elapsed=Date.now()-GF.brewing.startedAt;
      tileKids.push(h("div",{style:{marginTop:"6px"}},[bar(Math.min(100,elapsed/BREW_CRAFT_MS*100),"bar-brew")]));
    } else {
      tileKids.push(h("button",{style:{marginTop:"6px"},disabled:!can||!!GF.brewing,onClick:()=>startBrew(recipe)},["Brew"]));
    }
    grid.appendChild(h("div",{class:"tile"},tileKids));
  }
  root.appendChild(grid);
  root.appendChild(h("button",{style:{marginTop:"12px"},onClick:()=>GF.goto("town")},["← Back to Town"]));
  return root;
}

/* ================= STORAGE VAULT ================= */
// A 20x10 (200-slot) chest shared across every character on the account, not just the
// one currently loaded -- backed by the server's /api/vault endpoints (see server.js),
// scoped to the logged-in account so nobody else's stash is ever reachable. Each slot
// holds either one gear instance, or one stack of a single consumable/herb type.

function vaultFindEmptySlot(){
  const items=Net.vaultCache||[];
  const capacity=Net.vaultCapacity||200;
  const used=new Set(items.map(i=>i.slot));
  for(let i=0;i<capacity;i++) if(!used.has(i)) return i;
  return -1;
}
function vaultSync(){
  Net.saveVault(Net.vaultCache||[]).catch(e=>setToast("Could not sync the vault with the server: "+e.message));
}
function vaultDepositGear(instanceId){
  const slot=vaultFindEmptySlot();
  if(slot===-1){ setToast("The vault is full."); return; }
  const idx=PS.findGearIndex(instanceId);
  if(idx===-1) return;
  const inst=PS.gear_instances[idx];
  PS.gear_instances.splice(idx,1);
  Net.vaultCache.push({slot,kind:"gear",inst});
  PS.saveGame(); vaultSync(); render();
}
function vaultDepositConsumable(itemId){
  const qty=PS.consumables[itemId]||0; if(qty<=0) return;
  const existing=(Net.vaultCache||[]).find(e=>e.kind==="consumable"&&e.item_id===itemId);
  if(existing){ existing.qty+=qty; }
  else {
    const slot=vaultFindEmptySlot();
    if(slot===-1){ setToast("The vault is full."); return; }
    Net.vaultCache.push({slot,kind:"consumable",item_id:itemId,qty});
  }
  delete PS.consumables[itemId];
  PS.saveGame(); vaultSync(); render();
}
function vaultDepositHerb(herbId){
  const qty=PS.herbs[herbId]||0; if(qty<=0) return;
  const existing=(Net.vaultCache||[]).find(e=>e.kind==="herb"&&e.herb_id===herbId);
  if(existing){ existing.qty+=qty; }
  else {
    const slot=vaultFindEmptySlot();
    if(slot===-1){ setToast("The vault is full."); return; }
    Net.vaultCache.push({slot,kind:"herb",herb_id:herbId,qty});
  }
  delete PS.herbs[herbId];
  PS.saveGame(); vaultSync(); render();
}
function vaultWithdraw(slotIndex){
  const idx=(Net.vaultCache||[]).findIndex(e=>e.slot===slotIndex);
  if(idx===-1) return;
  const entry=Net.vaultCache[idx];
  if(entry.kind==="gear"){
    if(!PS.addGear(entry.inst)){ setToast("Your backpack is full."); return; }
  } else if(entry.kind==="consumable"){
    PS.addConsumable(entry.item_id,entry.qty);
  } else if(entry.kind==="herb"){
    PS.addHerb(entry.herb_id,entry.qty);
  }
  Net.vaultCache.splice(idx,1);
  PS.saveGame(); vaultSync(); render();
}

function screenAuctionHouse(){
  const root=h("div",{});
  root.appendChild(h("h2",{},["Auction House"]));
  root.appendChild(h("div",{class:"lore"},["A dusty ledger and an idle gavel. List your own finds, or see what other travelers are selling."]));
  const t=toastBox(); if(t) root.appendChild(t);
  root.appendChild(statHeader());

  if(!Net.online){
    root.appendChild(h("div",{class:"muted"},["Log in online to buy and sell with other travelers."]));
    root.appendChild(h("button",{style:{marginTop:"12px"},onClick:()=>GF.goto("town")},["← Back to Town"]));
    return root;
  }

  root.appendChild(h("h3",{},["List an Item"]));
  const gearOptions=[h("option",{value:""},["-- choose gear to sell --"])].concat(
    PS.gear_instances.map(inst=>h("option",{value:inst.instance_id},[`${IF.displayName(inst)} (T${inst.tier})`]))
  );
  const gearSelect=h("select",{},gearOptions);
  const gearPriceInput=h("input",{type:"number",min:"1",value:"10",style:{width:"90px"}});
  root.appendChild(h("div",{class:"row gap",style:{marginBottom:"10px"}},[
    gearSelect, h("span",{},["Price:"]), gearPriceInput,
    h("button",{onClick:async ()=>{
      const instId=gearSelect.value;
      if(!instId){ setToast("Choose a gear item first."); render(); return; }
      const price=parseInt(gearPriceInput.value,10);
      if(!price||price<1){ setToast("Enter a valid price."); render(); return; }
      const idx=PS.findGearIndex(instId); if(idx===-1) return;
      const inst=PS.gear_instances[idx];
      try{
        await Net.createAuctionListing({type:"gear", price, character_name:PS.character_name, seller_slot:PS.current_slot, item:inst, display_name:IF.displayName(inst)});
        PS.gear_instances.splice(idx,1); PS.saveGame();
        Net.auctionCache=null; setToast(`Listed ${IF.displayName(inst)} for ${price} gold.`);
      }catch(e){ setToast(e.message); }
      render();
    }},["List Gear"]),
  ]));

  const stackables=[];
  for(const id of Object.keys(PS.consumables)) if(PS.consumables[id]>0) stackables.push({kind:"consumable", id, name:DL.getItem(id).name, have:PS.consumables[id]});
  for(const id of Object.keys(PS.herbs)) if(PS.herbs[id]>0) stackables.push({kind:"herb", id, name:DL.getHerb(id).name, have:PS.herbs[id]});
  const stackOptions=[h("option",{value:""},["-- choose consumable/herb to sell --"])].concat(
    stackables.map(s=>h("option",{value:s.kind+":"+s.id},[`${s.name} (have ${s.have})`]))
  );
  const stackSelect=h("select",{},stackOptions);
  const stackQtyInput=h("input",{type:"number",min:"1",value:"1",style:{width:"70px"}});
  const stackPriceInput=h("input",{type:"number",min:"1",value:"5",style:{width:"90px"}});
  root.appendChild(h("div",{class:"row gap",style:{marginBottom:"14px"}},[
    stackSelect, h("span",{},["Qty:"]), stackQtyInput, h("span",{},["Price (total):"]), stackPriceInput,
    h("button",{onClick:async ()=>{
      const val=stackSelect.value; if(!val){ setToast("Choose an item first."); render(); return; }
      const [kind,id]=val.split(":");
      const qty=parseInt(stackQtyInput.value,10), price=parseInt(stackPriceInput.value,10);
      const have=(kind==="consumable"?PS.consumables[id]:PS.herbs[id])||0;
      if(!qty||qty<1||qty>have){ setToast("Enter a valid quantity you actually have."); render(); return; }
      if(!price||price<1){ setToast("Enter a valid price."); render(); return; }
      const displayName=kind==="consumable"?DL.getItem(id).name:DL.getHerb(id).name;
      try{
        await Net.createAuctionListing({type:kind, item_key:id, quantity:qty, price, character_name:PS.character_name, seller_slot:PS.current_slot, display_name:displayName});
        if(kind==="consumable") PS.consumables[id]-=qty; else PS.herbs[id]-=qty;
        PS.saveGame(); Net.auctionCache=null;
        setToast(`Listed ${displayName} x${qty} for ${price} gold.`);
      }catch(e){ setToast(e.message); }
      render();
    }},["List"]),
  ]));

  root.appendChild(h("h3",{},["Current Listings"]));
  if(Net.auctionCache===null||Net.auctionCache===undefined){
    root.appendChild(h("div",{class:"muted"},["Loading..."]));
    Net.fetchAuction().then(render).catch(()=>{ setToast("Could not load the auction house."); render(); });
  } else if(Net.auctionCache.length===0){
    root.appendChild(h("div",{class:"muted"},["The block is empty right now, be the first to list something."]));
  } else {
    for(const listing of Net.auctionCache){
      const isMine=listing.seller_username===Net.username;
      const label=listing.quantity>1?`${listing.display_name} x${listing.quantity}`:listing.display_name;
      root.appendChild(h("div",{class:"tile row",style:{marginBottom:"6px",justifyContent:"space-between"}},[
        h("div",{},[h("span",{style:{fontWeight:"bold"}},[label]), h("span",{class:"muted"},[`, listed by ${listing.seller_character_name} (${listing.seller_username})`])]),
        h("div",{class:"row gap"},[
          h("span",{class:"gold-text"},[`${listing.price}g`]),
          isMine?h("button",{class:"danger",onClick:async ()=>{
            try{
              const r=await Net.cancelAuctionListing(listing.id,{character_name:PS.character_name});
              if(r.refund){
                if(r.refund.type==="gear" && r.refund.item) PS.addGear(r.refund.item);
                else if(r.refund.type==="consumable") PS.addConsumable(r.refund.item_key,r.refund.quantity);
                else if(r.refund.type==="herb") PS.addHerb(r.refund.item_key,r.refund.quantity);
                PS.saveGame();
              }
              setToast("Listing cancelled, item returned to your bags.");
            }
            catch(e){ setToast(e.message+" (refreshing listings...)"); }
            Net.auctionCache=null;
            await Net.fetchAuction();
            render();
          }},["Cancel"]):h("button",{disabled:PS.gold<listing.price,onClick:async ()=>{
            try{
              await Net.buyAuctionListing(listing.id,{character_name:PS.character_name, buyer_slot:PS.current_slot});
              PS.gold-=listing.price;
              if(listing.type==="gear") PS.addGear(listing.item);
              else if(listing.type==="consumable") PS.addConsumable(listing.item_key,listing.quantity);
              else if(listing.type==="herb") PS.addHerb(listing.item_key,listing.quantity);
              PS.saveGame();
              setToast(`Bought ${label} for ${listing.price} gold.`);
            }catch(e){ setToast(e.message+" (refreshing listings...)"); }
            Net.auctionCache=null;
            await Net.fetchAuction();
            render();
          }},["Buy"]),
        ]),
      ]));
    }
  }

  root.appendChild(h("button",{style:{marginTop:"12px"},onClick:()=>GF.goto("town")},["← Back to Town"]));
  return root;
}

/* ================= MASTER TRIAL ================= */

function getTrialProgress(){
  if(!PS.trial_progress) PS.trial_progress={};
  if(!PS.trial_progress[PS.class_id]) PS.trial_progress[PS.class_id]={stage:0,discoveredSides:[]};
  if(!PS.trial_progress[PS.class_id].discoveredSides) PS.trial_progress[PS.class_id].discoveredSides=[];
  return PS.trial_progress[PS.class_id];
}

function screenMasterTrial(){
  const root=h("div",{});
  const c=PS.getClassData();
  const nextId=DL.getNextClassId(PS.class_id);
  const currentTier=c.tier||1;
  root.appendChild(h("h2",{},["Broken Bridge Challenge"]));
  if(!nextId){
    root.appendChild(h("div",{class:"lore"},[`${c.display_name} is the final form of your path. The elders have no further plank bridge to offer, whatever comes next for a champion of the season is still being prepared. Not yet implemented, check back in a future update.`]));
    root.appendChild(h("button",{onClick:()=>GF.goto("town")},["← Back to Town"]));
    return root;
  }
  const levelReq=Balance.trialLevelRequirement(currentTier);
  // A failed attempt resets the player to level 1, which would normally fall back below
  // the level gate below, but the failed board must stay visible until the player
  // acknowledges it and leaves, so the gate is skipped for that one render.
  if(!PS.canAttemptTrial() && !GF.trialJustFailed){
    root.appendChild(h("div",{class:"lore"},[`You must reach Level ${levelReq} as a ${c.display_name} before the elders will test you.`]));
    root.appendChild(h("button",{onClick:()=>GF.goto("town")},["← Back to Town"]));
    return root;
  }
  const t=toastBox(); if(t) root.appendChild(t);
  const plankCount=Balance.bridgePlankCount(currentTier);
  root.appendChild(h("div",{class:"lore"},[`Cross the ancient plank bridge to prove yourself worthy of becoming a ${DL.getClass(nextId).display_name}. Each step hides ${plankCount} planks, only one holds. Fall, and the attempt ends there, but the bridge remembers every safe step you've already found.`]));

  const rows=Balance.BRIDGE_ROWS;
  const stepChance=Balance.bridgeStepPassChance(currentTier);
  const progress=getTrialProgress();
  const failed=!!GF.trialJustFailed;

  root.appendChild(h("div",{class:"panel",style:{marginBottom:"10px"}},[
    h("div",{class:"flavor",style:{margin:"0"}},["Tread carefully, a wrong step is a costly investment."]),
  ]));

  function attemptStep(plankIndex){
    if(failed) return;
    const passed=Math.random()<stepChance;
    if(passed){
      progress.discoveredSides.push(plankIndex);
      autosave();
      if(progress.discoveredSides.length>=rows){
        const nameBefore=c.display_name, levelBefore=PS.level;
        const result=PS.resolveMasterTrial(true);
        PS.trial_progress[PS.class_id]={stage:0,discoveredSides:[]};
        autosave();
        Net.announceTrialResult({character_name:PS.character_name, level:levelBefore, class_name:nameBefore, result:"passed", new_class_name:DL.getClass(PS.class_id).display_name});
        setToast(result.final_tier?`You have mastered the ${c.chain} path completely!`:`You are promoted to ${DL.getClass(PS.class_id).display_name}!`);
        GF.ventureDepth=1; GF.goto("town"); return;
      }
      render();
    } else {
      GF.trialJustFailed=true; GF.trialFailedPlankIndex=plankIndex; GF.trialFailedStepIndex=progress.discoveredSides.length;
      setToast("The plank gives way beneath you! The attempt ends here.");
      Net.announceTrialResult({character_name:PS.character_name, level:PS.level, class_name:c.display_name, result:"failed", failed_step:progress.discoveredSides.length+1});
      PS.resolveMasterTrial(false);
      autosave();
      render();
    }
  }

  // Horizontal layout: the bridge crosses left-to-right, one column per step, each
  // column stacking that step's planks vertically (2 to 5 of them depending on tier).
  const plankCols=h("div",{class:"row gap",style:{overflowX:"auto",paddingBottom:"6px"}});
  for(let i=0;i<rows;i++){
    const discoveredPlank=progress.discoveredSides[i];
    const isCurrent=i===progress.discoveredSides.length && !failed;
    const isFailedStep=failed && i===GF.trialFailedStepIndex;
    const col=h("div",{class:"col gap",style:{alignItems:"center"}});
    for(let p=0;p<plankCount;p++){
      const isSafe=discoveredPlank===p;
      const isUnsafe=isFailedStep && GF.trialFailedPlankIndex===p;
      col.appendChild(h("button",{class:"plank-btn"+(isSafe?" safe":(isUnsafe?" unsafe":"")),
        disabled:!isCurrent,
        onClick:()=>attemptStep(p)},[inlineIcon(FOOTSTEP_SVG,16)]));
    }
    plankCols.appendChild(col);
  }
  root.appendChild(plankCols);

  root.appendChild(h("div",{class:"row",style:{marginTop:"10px"}},[
    h("button",{onClick:()=>{ GF.trialJustFailed=false; GF.trialFailedPlankIndex=null; if(failed) GF.ventureDepth=1; GF.goto("town"); }},[failed?"Return to Town":"← Retreat to Town"]),
  ]));
  return root;
}

/* ================= ADMIN PANEL ================= */

function screenAdminPanel(){
  const root=h("div",{});
  root.appendChild(h("h2",{},["Dev Tools"]));
  if(!GF.admin_unlocked){
    root.appendChild(h("div",{class:"muted",style:{marginBottom:"8px"}},[
      "Dev Tools is gated by the server's real admin token (the ADMIN_TOKEN environment variable set on the server), there's no password stored in this page.",
    ]));
    const tokenInput=h("input",{type:"password",placeholder:"Admin token"});
    root.appendChild(h("div",{class:"row gap"},[tokenInput,
      h("button",{onClick:async ()=>{
        const value=tokenInput.value||"";
        let ok=false;
        try{ ok=await Net.verifyAdminToken(value); }catch(e){ ok=false; }
        if(ok){ GF.admin_unlocked=true; GF.admin_token=value; } else setToast("Invalid admin token.");
        render();
      }},["Unlock"]),
    ]));
    const t=toastBox(); if(t) root.appendChild(t);
    root.appendChild(h("button",{style:{marginTop:"12px"},onClick:()=>GF.goto("town")},["← Back to Town"]));
    return root;
  }
  root.appendChild(h("div",{class:"muted"},["For local testing only, affects the currently loaded character."]));
  root.appendChild(h("div",{class:"row",style:{marginTop:"10px",flexWrap:"wrap"}},[
    h("button",{onClick:()=>{PS.gold+=500;PS.saveGame();render();}},["+500 gold"]),
    h("button",{onClick:()=>{PS.materials+=200;PS.saveGame();render();}},["+200 materials"]),
    h("button",{onClick:()=>{for(let i=0;i<10;i++)PS.addXp(PS.xp_to_next);PS.saveGame();render();}},["+10 levels"]),
    h("button",{onClick:()=>{PS.level=Balance.LEVEL_CAP;PS.xp=0;PS.xp_to_next=Balance.xpRequiredForLevel(PS.level);PS.current_hp=PS.getMaxHp();PS.saveGame();render();}},["Set level to cap"]),
    h("button",{onClick:()=>{PS.addGear(IF.generate(Balance.itemTierForAreaLevel(PS.level)));PS.saveGame();render();}},["Spawn random gear"]),
    h("button",{class:"danger",onClick:()=>{ askConfirm("Wipe this save?",()=>{ if(PS.current_slot>=0) deleteSave(PS.current_slot); GF.goto("mainMenuSlots"); },{confirmLabel:"Wipe it"}); }},["Wipe this save"]),
  ]));

  root.appendChild(h("h3",{style:{marginTop:"18px"}},["Leaderboard Moderation"]));
  root.appendChild(h("div",{class:"muted",style:{marginBottom:"8px"}},[
    "Remove buggy or clearly-cheated entries from the shared leaderboard, using the same admin token you unlocked Dev Tools with.",
  ]));
  root.appendChild(h("div",{class:"row gap",style:{marginBottom:"8px"}},[
    h("button",{onClick:async ()=>{
      GF.admin_leaderboard_error="";
      try{
        GF.admin_leaderboard_cache=await Net.fetchAdminLeaderboard(GF.admin_token||"");
      }catch(e){
        GF.admin_leaderboard_error=e.message||"Could not load the leaderboard.";
        GF.admin_leaderboard_cache=null;
      }
      render();
    }},["Load Full Leaderboard"]),
  ]));
  if(GF.admin_leaderboard_error) root.appendChild(h("div",{class:"muted",style:{color:"#e07a7a",marginBottom:"8px"}},[GF.admin_leaderboard_error]));
  if(GF.admin_leaderboard_cache){
    if(GF.admin_leaderboard_cache.length===0){
      root.appendChild(h("div",{class:"muted"},["No leaderboard entries."]));
    } else {
      for(const entry of GF.admin_leaderboard_cache){
        root.appendChild(h("div",{class:"tile row",style:{justifyContent:"space-between",alignItems:"center",marginBottom:"6px",gap:"10px"}},[
          h("div",{},[
            h("div",{},[
              h("span",{style:{fontWeight:"bold"}},[entry.character_name]),
              h("span",{class:"muted"},[` (${entry.player}, acct #${entry.account_id})`]),
              entry.hardcore?h("span",{style:{color:"#e0b23d",fontWeight:"bold"}},[" [Hardcore]"]):null,
              entry.is_dead?h("span",{class:"muted"},[" [Dead]"]):null,
            ]),
            h("div",{class:"muted"},[`Lv ${entry.level} ${entry.class_name} (Tier ${entry.highest_tier_reached}), ${entry.lifetime_xp} Experience, ${entry.gold} Gold, updated ${new Date(entry.updated_at).toLocaleString()}`]),
          ]),
          h("button",{class:"danger",onClick:()=>{
            askConfirm(`Remove "${entry.character_name}" (${entry.player}) from the leaderboard? This cannot be undone.`,async ()=>{
              try{
                await Net.adminDeleteLeaderboardEntry(entry.account_id,entry.character_name,GF.admin_token||"");
                GF.admin_leaderboard_cache=GF.admin_leaderboard_cache.filter(x=>!(x.account_id===entry.account_id && x.character_name===entry.character_name));
              }catch(err){
                GF.admin_leaderboard_error=err.message||"Could not delete that entry.";
              }
              render();
            },{confirmLabel:"Delete"});
          }},["Delete"]),
        ]));
      }
    }
  }

  root.appendChild(h("button",{style:{marginTop:"12px"},onClick:()=>GF.goto("town")},["← Back to Town"]));
  return root;
}

/* ---------- Campfire regen tick: gradual HP/Stamina recovery while resting in camp ---------- */
const REGEN_ACTIVE_SCREENS=["town","inventory"];
setInterval(()=>{
  if(!PS.isRestingAtCampfire || PS.current_slot<0) return;
  if(!REGEN_ACTIVE_SCREENS.includes(GF.screen)) return;
  let changed=false;
  if(PS.current_hp<PS.getMaxHp()){ PS.current_hp=Math.min(PS.getMaxHp(),PS.current_hp+Balance.CAMPFIRE_REGEN_PER_SECOND); changed=true; }
  if(PS.current_stamina<PS.getMaxStamina()){ PS.current_stamina=Math.min(PS.getMaxStamina(),PS.current_stamina+Balance.CAMPFIRE_STAMINA_REGEN_PER_SECOND); changed=true; }
  if(PS.current_hp>=PS.getMaxHp() && PS.current_stamina>=PS.getMaxStamina()) PS.isRestingAtCampfire=false;
  if(changed){ PS.saveGame(); render(); }
},1000);

(async function boot(){
  const resumed = await Net.tryResumeSession();
  if(resumed) GF.screen="mainMenuSlots";
  render();
})();
